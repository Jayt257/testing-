<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pronunciation · LearnWise</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800;900&family=Inter:wght@300;400;500&family=Noto+Sans+Gujarati:wght@400;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="data/roadmap-data.js"></script><script src="data/activities-content.js"></script>
<script src="data/content-bundle.js"></script>
<script src="data/content-loader.js"></script>
<script src="data/lw-init.js"></script>
<script src="data/blocks-renderer.js"></script><script src="data/en-gu-month1.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#07061a;color:#e2e8f0;min-height:100vh;overflow-x:hidden;}
h1,h2,h3,button{font-family:'Plus Jakarta Sans',sans-serif;}
.gu{font-family:'Noto Sans Gujarati',sans-serif;}
.ms{font-variation-settings:'FILL' 0,'wght' 400}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 30% 0%,#2d0a3e 0%,#0d0b22 55%,#060410 100%);}
.grid-bg{position:fixed;inset:0;z-index:0;opacity:.35;background:repeating-linear-gradient(0deg,transparent,transparent 47px,rgba(236,72,153,.05) 47px,rgba(236,72,153,.05) 48px),repeating-linear-gradient(90deg,transparent,transparent 47px,rgba(236,72,153,.05) 47px,rgba(236,72,153,.05) 48px);}
.orb{position:fixed;border-radius:50%;filter:blur(90px);z-index:0;}
@keyframes fl{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-30px) scale(1.06);}}
.page{position:relative;z-index:1;}
.nav{position:sticky;top:0;z-index:50;background:rgba(7,6,26,.9);backdrop-filter:blur(22px);border-bottom:1px solid rgba(236,72,153,.2);height:56px;display:flex;align-items:center;padding:0 16px;gap:10px;}
.back{width:34px;height:34px;border-radius:9px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.55);text-decoration:none;transition:all .18s;flex-shrink:0;}
.back:hover{background:rgba(255,255,255,.13);color:#fff;}
.pbar{height:3px;background:rgba(255,255,255,.06);}
.pfill{height:3px;background:linear-gradient(90deg,#ec4899,#f472b6);transition:width .7s ease;}
.cmax{max-width:700px;margin:0 auto;padding:16px 16px 120px;}

/* Phoneme stage */
.stage{background:linear-gradient(135deg,rgba(236,72,153,.18),rgba(236,72,153,.05));border:1px solid rgba(236,72,153,.3);border-radius:22px;padding:28px 20px;text-align:center;margin-bottom:20px;position:relative;overflow:hidden;}
.stage::before{content:'';position:absolute;top:-50px;left:50%;transform:translateX(-50%);width:200px;height:200px;background:radial-gradient(circle,rgba(236,72,153,.15),transparent 70%);}
.phon-char{font-family:'Noto Sans Gujarati',sans-serif;font-size:88px;font-weight:900;color:#fff;line-height:1;display:block;text-shadow:0 4px 40px rgba(236,72,153,.5);animation:charIn .4s cubic-bezier(.34,1.4,.64,1) both;}
@keyframes charIn{from{opacity:0;transform:scale(.6);}to{opacity:1;transform:scale(1);}}
.phon-rom{font-size:22px;font-weight:800;color:rgba(244,114,182,.9);margin-top:8px;}
.phon-ipa{font-size:14px;color:rgba(255,255,255,.35);margin-top:4px;font-style:italic;}
.phon-en{font-size:15px;color:rgba(255,255,255,.55);margin-top:10px;}
.phon-like{background:rgba(236,72,153,.12);border:1px solid rgba(236,72,153,.2);border-radius:999px;display:inline-block;padding:5px 14px;font-size:13px;color:rgba(244,114,182,.8);margin-top:10px;}

/* Waveform (decorative) */
.wave-wrap{display:flex;align-items:center;justify-content:center;gap:4px;height:48px;margin:18px 0;}
.wbar{width:4px;background:linear-gradient(to top,#ec4899,#f472b6);border-radius:2px;transform-origin:bottom;animation:wave var(--d,1s) ease-in-out var(--dl,0s) infinite alternate;}
@keyframes wave{from{height:6px;opacity:.4;}to{height:var(--h,28px);opacity:1;}}

/* Audio controls (UI only) */
.audio-ctrl{display:flex;gap:10px;align-items:center;justify-content:center;margin:14px 0;}
.btn-play{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#ec4899,#be185d);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(236,72,153,.5);transition:all .2s;position:relative;overflow:hidden;}
.btn-play:hover{transform:scale(1.08);box-shadow:0 10px 32px rgba(236,72,153,.65);}
.btn-play:active{transform:scale(.94);}
.btn-slow{padding:10px 18px;border-radius:12px;background:rgba(236,72,153,.12);border:1px solid rgba(236,72,153,.25);color:rgba(244,114,182,.9);font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;transition:all .2s;}
.btn-slow:hover{background:rgba(236,72,153,.22);}
.btn-slow.active-play{background:rgba(236,72,153,.3);border-color:#ec4899;}

/* Record button (UI only) */
.rec-section{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;text-align:center;margin-bottom:14px;}
.btn-record{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,rgba(236,72,153,.2),rgba(236,72,153,.08));border:2px solid rgba(236,72,153,.4);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 12px;transition:all .25s;gap:4px;}
.btn-record:hover{background:rgba(236,72,153,.25);transform:scale(1.05);}
.btn-record.recording{background:rgba(236,72,153,.4);border-color:#ec4899;animation:pulse-rec 1.2s ease infinite;}
@keyframes pulse-rec{0%,100%{box-shadow:0 0 0 0 rgba(236,72,153,.4);}50%{box-shadow:0 0 0 12px rgba(236,72,153,0);}}

/* Practice list */
.plist-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:all .2s;}
.plist-item:hover{background:rgba(236,72,153,.08);border-color:rgba(236,72,153,.2);}
.plist-item.done{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.06);}
.plist-gu{font-family:'Noto Sans Gujarati',sans-serif;font-size:22px;font-weight:700;color:#f472b6;min-width:55px;}
.plist-rom{font-size:13px;color:rgba(255,255,255,.6);}
.plist-en{font-size:11px;color:rgba(255,255,255,.3);}
.dot-nav{display:flex;gap:6px;justify-content:center;margin:16px 0 8px;}
.dn{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.12);cursor:pointer;transition:all .25s;}
.dn.cur{background:#ec4899;transform:scale(1.5);}
.dn.done{background:#10b981;}

/* Bottom bar */
.bbar{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(7,6,26,.94);backdrop-filter:blur(22px);border-top:1px solid rgba(236,72,153,.2);padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom,12px));}
.binner{max-width:700px;margin:0 auto;display:flex;gap:9px;}
.btn-nxt{flex:1;background:linear-gradient(135deg,#ec4899,#be185d);color:#fff;font-weight:800;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border-radius:13px;padding:13px;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .25s;box-shadow:0 6px 24px rgba(236,72,153,.4);position:relative;overflow:hidden;}
.btn-nxt:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(236,72,153,.6);}
.btn-nxt:active{transform:scale(.97);}
.btn-nxt.green{background:linear-gradient(135deg,#10b981,#059669);box-shadow:0 6px 24px rgba(16,185,129,.4);}
.btn-back{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5);transition:all .18s;flex-shrink:0;}
.btn-back:hover{background:rgba(255,255,255,.12);color:#fff;}
#ov{display:none;position:fixed;inset:0;z-index:900;background:rgba(4,3,14,.92);backdrop-filter:blur(20px);align-items:center;justify-content:center;padding:20px;}
#ov.show{display:flex;}
.ocard{background:linear-gradient(145deg,#1a1532,#0d0b1e);border:1.5px solid rgba(236,72,153,.4);border-radius:24px;padding:38px 28px;text-align:center;max-width:340px;width:100%;animation:popin .45s cubic-bezier(.34,1.4,.64,1);}
@keyframes popin{from{opacity:0;transform:scale(.75);}to{opacity:1;transform:scale(1);}}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.18);transform:scale(0);animation:rp .55s linear;pointer-events:none;}
@keyframes rp{to{transform:scale(4);opacity:0;}}
@keyframes fadeup{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
#fw{position:fixed;inset:0;z-index:800;pointer-events:none;display:none;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:rgba(236,72,153,.3);border-radius:2px;}
</style>
</head>
<body>
<div class="bg"></div><div class="grid-bg"></div>
<div class="orb" style="width:380px;height:380px;background:rgba(236,72,153,.15);top:-100px;left:-80px;animation:fl 15s ease-in-out infinite;"></div>
<div class="orb" style="width:260px;height:260px;background:rgba(219,39,119,.1);bottom:8%;right:-50px;animation:fl 19s ease-in-out -9s infinite;"></div>
<canvas id="fw"></canvas>

<div id="ov">
  <div class="ocard">
    <div style="width:74px;height:74px;border-radius:50%;background:linear-gradient(135deg,#ec4899,#be185d);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 10px 36px rgba(236,72,153,.5);">
      <span class="ms material-symbols-outlined" style="font-size:36px;color:#fff;font-variation-settings:'FILL' 1">mic</span>
    </div>
    <h2 style="font-size:22px;font-weight:900;color:#fff;margin-bottom:6px;">Practice Complete!</h2>
    <p style="font-size:13px;color:rgba(255,255,255,.4);margin-bottom:16px;" id="ov-nm"></p>
    <div style="font-size:38px;font-weight:900;background:linear-gradient(135deg,#f472b6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;" id="ov-xp">+30 XP</div>
    <p style="font-size:12px;color:rgba(255,255,255,.28);margin-bottom:26px;">Great pronunciation practice! 🎤</p>
    <button onclick="goBack()" style="width:100%;background:linear-gradient(135deg,#ec4899,#be185d);color:#fff;font-weight:800;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border-radius:13px;padding:13px;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 22px rgba(236,72,153,.45);transition:transform .2s;" onmouseover="this.style.transform='translateY(-1px)'" onmouseout="this.style.transform='translateY(0)'">
      <span class="ms material-symbols-outlined" style="font-size:18px;font-variation-settings:'FILL' 1">map</span> Back to Roadmap
    </button>
  </div>
</div>

<div class="page">
  <nav class="nav">
    <a class="back" href="roadmap.html" id="back-a"><span class="ms material-symbols-outlined" style="font-size:20px;">arrow_back</span></a>
    <div style="width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#ec4899,#be185d);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <span class="ms material-symbols-outlined" style="font-size:16px;color:#fff;font-variation-settings:'FILL' 1">mic</span>
    </div>
    <div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:800;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" id="nav-title">Pronunciation</div></div>
    <div style="display:flex;gap:6px;flex-shrink:0;">
      <span style="background:rgba(236,72,153,.15);border:1px solid rgba(236,72,153,.3);color:#f472b6;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:700;" id="nav-ctr">1/1</span>
      <span style="background:rgba(236,72,153,.2);border:1px solid rgba(236,72,153,.3);color:#f472b6;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:800;" id="nav-xp">⚡30</span>
    </div>
  </nav>
  <div class="pbar"><div class="pfill" id="prog" style="width:0%"></div></div>
  <div class="cmax" id="content"></div>
</div>

<div class="bbar">
  <div class="binner">
    <button class="btn-back" onclick="prevPhon()"><span class="ms material-symbols-outlined" style="font-size:18px;">arrow_back</span></button>
    <button class="btn-nxt" id="btn-nxt" onclick="nextPhon()">
      <span class="ms material-symbols-outlined" style="font-size:19px;font-variation-settings:'FILL' 1" id="btn-icon">arrow_forward</span>
      <span id="btn-txt">Next Sound</span>
    </button>
  </div>
</div>

<script>
const P=new URLSearchParams(location.search);
const LANG=P.get('lang')||'gujarati',AID=parseInt(P.get('id'))||4,AXP=parseInt(P.get('xp'))||30;
let act=null,cnt=null,phonems=[],cur=0,practiced=new Set(),isRec=false;

async function init(){
  const all=LWData.getActivities(LANG);
  outer:for(const m of all)for(const a of m.activities){if(a.id===AID){act=a;break outer;}}
  cnt = await LWInit.loadActivityContent(AID, LANG); // BUG #4 FIX
    if(cnt?.blocks){cnt.blocks.forEach(b=>{if(b.type==='keypoints'&&b.points)phonems.push(...b.points);});}
    // Fallback phonemes
    if(!phonems.length)phonems=['અ (a) — like "u" in cup','આ (aa) — like "a" in father','ઇ (i) — like "i" in bit','ઈ (ee) — like "ee" in feet','ઉ (u) — like "u" in put','ઊ (oo) — like "oo" in food','એ (e) — like "e" in café','ઓ (o) — like "o" in note'];
    document.getElementById('nav-title').textContent=cnt?.title||act?.title||'Pronunciation';
    document.getElementById('nav-xp').textContent='⚡'+(cnt?.xp||act?.xp||AXP);
    render();
}


function render(){
  const c=document.getElementById('content');
  const raw=phonems[cur]||'';
  // Parse: "gu (rom) — description · Example: ..."
  const guMatch=raw.match(/^([\u0A80-\u0AFF\u0020]+)/);
  const guText=guMatch?guMatch[1].trim():raw.split('(')[0].trim();
  const romMatch=raw.match(/\(([^)]+)\)/);
  const romText=romMatch?romMatch[1]:'';
  const descMatch=raw.match(/—\s*(.+?)(?:·|$)/);
  const desc=descMatch?descMatch[1].trim():'';
  const exMatch=raw.match(/Example:\s*(.+)/);
  const ex=exMatch?exMatch[1].trim():'';

  // Random wave heights for decoration
  const bars=Array.from({length:22},(_,i)=>{const h=8+Math.abs(Math.sin(i*.55+cur))*32;const d=0.6+Math.random()*.8;const dl=-(Math.random()*0.8);return`<div class="wbar" style="--h:${h}px;--d:${d}s;--dl:${dl}s;height:${h}px;opacity:${.4+Math.random()*.6};"></div>`;}).join('');

  c.innerHTML=`
  <!-- Hero stage -->
  <div class="stage" style="animation:fadeup .4s ease both;">
    <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:rgba(244,114,182,.6);margin-bottom:12px;">Sound ${cur+1} of ${phonems.length}</div>
    <span class="phon-char gu">${esc(guText)}</span>
    ${romText?`<div class="phon-rom">/${esc(romText)}/</div>`:''}
    ${desc?`<div class="phon-en">${esc(desc)}</div>`:''}
    ${desc?`<div class="phon-like">sounds like ${esc(desc)}</div>`:''}

    <!-- Decorative waveform -->
    <div class="wave-wrap">${bars}</div>

    <!-- Audio controls — UI only -->
    <div class="audio-ctrl">
      <button class="btn-play" onclick="playNative(this)" title="Listen to native speaker">
        <span class="ms material-symbols-outlined" style="font-size:26px;color:#fff;font-variation-settings:'FILL' 1">play_arrow</span>
      </button>
      <button class="btn-slow" onclick="playSlow(this)" title="Slow speed">
        <span class="ms material-symbols-outlined" style="font-size:16px;">slow_motion_video</span> Slow
      </button>
      <button class="btn-slow" onclick="playRepeat(this)" title="Repeat">
        <span class="ms material-symbols-outlined" style="font-size:16px;">repeat</span> Loop
      </button>
    </div>
    ${ex?`<div style="background:rgba(236,72,153,.1);border:1px solid rgba(236,72,153,.2);border-radius:10px;padding:10px 14px;margin-top:12px;font-size:13px;color:rgba(255,255,255,.55);">Example: <span class="gu" style="color:#f472b6;font-size:15px;">${esc(ex.split(' — ')[0]||ex)}</span>${ex.includes(' — ')?` — <span style="color:rgba(255,255,255,.4);">${esc(ex.split(' — ')[1])}</span>`:''}</div>`:''}
  </div>

  <!-- Dot navigation -->
  <div class="dot-nav">${phonems.map((_,i)=>`<div class="dn${i===cur?' cur':practiced.has(i)?' done':''}" onclick="jumpTo(${i})"></div>`).join('')}</div>

  <!-- Record section — UI only, mic not connected -->
  <div class="rec-section" style="animation:fadeup .45s ease .1s both;">
    <div style="font-size:13px;font-weight:700;color:rgba(255,255,255,.5);margin-bottom:16px;">🎤 Practice Your Pronunciation</div>
    <button class="btn-record" id="rec-btn" onclick="toggleRecord(this)" title="Tap to record — feature coming soon">
      <span class="ms material-symbols-outlined" style="font-size:28px;color:#ec4899;font-variation-settings:'FILL' 1" id="rec-icon">mic</span>
      <span style="font-size:10px;color:rgba(236,72,153,.7);font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;" id="rec-label">TAP TO RECORD</span>
    </button>
    <p style="font-size:12px;color:rgba(255,255,255,.25);line-height:1.6;">Press record, say the sound out loud, then compare with the native audio.<br><span style="color:rgba(236,72,153,.4);">Mic integration coming soon 🚧</span></p>
    <!-- Simulated waveform when recording -->
    <div id="rec-wave" style="display:none;justify-content:center;align-items:center;gap:3px;height:36px;margin:12px 0;">
      ${Array.from({length:18},(_,i)=>`<div style="width:3px;border-radius:2px;background:#ec4899;animation:wave ${.4+Math.random()*.5}s ease-in-out ${-(Math.random()*.5)}s infinite alternate;" id="rw${i}"></div>`).join('')}
    </div>
  </div>

  <!-- All sounds list -->
  <div style="font-size:12px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 10px;">All ${phonems.length} Sounds to Practice</div>
  ${phonems.map((p,i)=>{
    const gm=p.match(/^([\u0A80-\u0AFF\u0020]+)/);const g=gm?gm[1].trim():p.split('(')[0].trim();
    const rm=p.match(/\(([^)]+)\)/);const r=rm?rm[1]:'';
    const dm=p.match(/—\s*(.+?)(?:·|$)/);const d=dm?dm[1].trim():'';
    return`<div class="plist-item${practiced.has(i)?' done':''}" onclick="jumpTo(${i})">
      <div style="width:32px;height:32px;border-radius:8px;background:${i===cur?'rgba(236,72,153,.25)':'rgba(255,255,255,.06)'};border:1px solid ${i===cur?'rgba(236,72,153,.4)':'rgba(255,255,255,.08)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <span class="gu" style="font-size:17px;color:${i===cur?'#f472b6':'rgba(255,255,255,.5)'};">${esc(g)}</span>
      </div>
      <div style="flex:1;">
        <div class="plist-rom">${r?`/${esc(r)}/`:''} ${d?`— ${esc(d)}`:''}</div>
      </div>
      <div style="width:24px;height:24px;border-radius:50%;border:1.5px solid ${practiced.has(i)?'rgba(16,185,129,.5)':'rgba(255,255,255,.1)'};display:flex;align-items:center;justify-content:center;">
        <span class="ms material-symbols-outlined" style="font-size:13px;color:${practiced.has(i)?'#10b981':'rgba(255,255,255,.2)'};font-variation-settings:'FILL' 1">${practiced.has(i)?'check':'radio_button_unchecked'}</span>
      </div>
    </div>`;
  }).join('')}`;

  updateBtn();
  document.getElementById('nav-ctr').textContent=`${cur+1}/${phonems.length}`;
  document.getElementById('prog').style.width=Math.round(((practiced.size)/phonems.length)*100)+'%';
}

function playNative(btn){
  btn.style.transform='scale(.9)';setTimeout(()=>btn.style.transform='scale(1)',150);
  // UI feedback only — audio backend not connected
  btn.querySelector('.ms').textContent='stop';setTimeout(()=>btn.querySelector('.ms').textContent='play_arrow',1800);
}
function playSlow(btn){btn.classList.add('active-play');setTimeout(()=>btn.classList.remove('active-play'),1500);}
function playRepeat(btn){btn.classList.add('active-play');setTimeout(()=>btn.classList.remove('active-play'),2000);}
function toggleRecord(btn){
  isRec=!isRec;
  const wave=document.getElementById('rec-wave');const icon=document.getElementById('rec-icon');const lbl=document.getElementById('rec-label');
  btn.classList.toggle('recording',isRec);
  wave.style.display=isRec?'flex':'none';
  if(isRec){icon.textContent='stop';lbl.textContent='RECORDING...';lbl.style.color='#ec4899';
    // Auto-stop after 3s for UX demo
    setTimeout(()=>{if(isRec){isRec=false;btn.classList.remove('recording');wave.style.display='none';icon.textContent='mic';lbl.textContent='TAP TO RECORD';lbl.style.color='';practiced.add(cur);render();}},3000);
  } else {icon.textContent='mic';lbl.textContent='TAP TO RECORD';lbl.style.color='';}
}
function nextPhon(){practiced.add(cur);if(cur<phonems.length-1){cur++;render();window.scrollTo({top:0,behavior:'smooth'});}else doComplete();}
function prevPhon(){if(cur>0){cur--;render();window.scrollTo({top:0,behavior:'smooth'});}}
function jumpTo(i){practiced.add(cur);cur=i;render();}
function updateBtn(){const last=cur===phonems.length-1;const btn=document.getElementById('btn-nxt');const ic=document.getElementById('btn-icon');const tx=document.getElementById('btn-txt');if(last){btn.className='btn-nxt green';ic.textContent='check_circle';tx.textContent='Complete Practice';}else{btn.className='btn-nxt';ic.textContent='arrow_forward';tx.textContent='Next Sound';}}
function doComplete(){
  const xp=cnt?.xp||AXP;const p=LWData.getProgress(LANG);const ids=p.completedIds||[];
  if(!ids.includes(AID))ids.push(AID);LWData.saveProgress(LANG,ids,(p.totalXP||0)+xp);
  document.getElementById('ov-nm').textContent=cnt?.title||act?.title||'Pronunciation';
  document.getElementById('ov-xp').textContent='+'+xp+' XP';
  document.getElementById('ov').classList.add('show');launchFW();
}
function goBack(){const p=LWData.getProgress(LANG);const d=(p.completedIds||[]).includes(AID);window.location.href='roadmap.html?lang='+LANG+(d?'&completed='+AID+'&xp='+(cnt?.xp||AXP):'');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function launchFW(){const c=document.getElementById('fw');c.style.display='block';c.width=innerWidth;c.height=innerHeight;const ctx=c.getContext('2d');const cols=['#ec4899','#f472b6','#10b981','#fbbf24'];const ps=Array.from({length:90},()=>({x:innerWidth/2+(Math.random()-.5)*280,y:innerHeight*.32,vx:(Math.random()-.5)*14,vy:(Math.random()-.5)*14-5,alpha:1,color:cols[~~(Math.random()*cols.length)],sz:Math.random()*5+2}));const t=()=>{ctx.clearRect(0,0,c.width,c.height);ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.22;p.alpha-=.014;ctx.globalAlpha=Math.max(0,p.alpha);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();});if(ps.some(p=>p.alpha>0))requestAnimationFrame(t);else c.style.display='none';};t();}
init();
</script>
