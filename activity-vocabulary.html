<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vocabulary · LearnWise</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&family=Noto+Sans+Gujarati:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="data/roadmap-data.js"></script><script src="data/activities-content.js"></script>
<script src="data/content-bundle.js"></script>
<script src="data/content-loader.js"></script>
<script src="data/lw-init.js"></script>
<script src="data/blocks-renderer.js"></script><script src="data/en-gu-month1.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;color:#e2e8f0;min-height:100vh;background:#07061a;overflow-x:hidden;}
h1,h2,h3,button{font-family:'Plus Jakarta Sans',sans-serif;}
.gu{font-family:'Noto Sans Gujarati','Shruti',sans-serif;}
.ms{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
.bg-base{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 70% 10%,#001e40 0%,#0d0b22 50%,#060410 100%);}
.bg-grid{position:fixed;inset:0;z-index:0;opacity:.35;background:repeating-linear-gradient(0deg,transparent,transparent 47px,rgba(14,165,233,.06) 47px,rgba(14,165,233,.06) 48px),repeating-linear-gradient(90deg,transparent,transparent 47px,rgba(14,165,233,.06) 47px,rgba(14,165,233,.06) 48px);}
.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;}
@keyframes fl{0%,100%{transform:translateY(0);}50%{transform:translateY(-28px);}}
.page{position:relative;z-index:1;}
.cmax{max-width:680px;margin:0 auto;padding:0 16px;}
.top-nav{position:sticky;top:0;z-index:50;background:rgba(7,6,26,.88);backdrop-filter:blur(22px);border-bottom:1px solid rgba(14,165,233,.2);height:56px;display:flex;align-items:center;padding:0 16px;gap:10px;}
.back-btn{width:34px;height:34px;border-radius:9px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.55);transition:all .18s;text-decoration:none;flex-shrink:0;}
.back-btn:hover{background:rgba(255,255,255,.13);color:#fff;}
.prog-track{height:3px;background:rgba(255,255,255,.06);}
.prog-fill{height:3px;background:linear-gradient(90deg,#0ea5e9,#38bdf8);transition:width .7s ease;}

/* Tab switcher */
.mode-tabs{display:flex;gap:6px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:4px;}
.mtab{flex:1;padding:7px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.4);transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif;}
.mtab.active{background:rgba(14,165,233,.2);color:#38bdf8;border:1px solid rgba(14,165,233,.3);}

/* FLASHCARD */
.card-arena{perspective:1200px;min-height:260px;display:flex;align-items:center;justify-content:center;margin:20px 0;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.fc{width:100%;max-width:440px;min-height:240px;position:relative;transform-style:preserve-3d;transition:transform .65s cubic-bezier(.4,0,.2,1);}
.fc.flipped{transform:rotateY(180deg);}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;text-align:center;}
.fc-front{background:linear-gradient(135deg,rgba(14,165,233,.25) 0%,rgba(14,165,233,.08) 100%);border:1.5px solid rgba(14,165,233,.35);box-shadow:0 20px 60px rgba(14,165,233,.15);}
.fc-back{background:linear-gradient(135deg,rgba(16,185,129,.22) 0%,rgba(16,185,129,.07) 100%);border:1.5px solid rgba(16,185,129,.35);transform:rotateY(180deg);box-shadow:0 20px 60px rgba(16,185,129,.12);}
.card-num{font-size:11px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px;}
.card-word{font-family:'Noto Sans Gujarati',sans-serif;font-size:44px;font-weight:900;color:#fff;line-height:1.2;margin-bottom:8px;}
.card-rom{font-size:16px;font-weight:600;color:rgba(56,189,248,.8);}
.card-hint{font-size:12px;color:rgba(255,255,255,.25);margin-top:10px;}
.card-meaning{font-size:24px;font-weight:800;color:#34d399;margin-bottom:8px;}
.card-example{font-family:'Noto Sans Gujarati',sans-serif;font-size:16px;color:rgba(255,255,255,.5);line-height:1.6;}

/* action btns */
.btn-know{flex:1;padding:13px;border-radius:13px;background:rgba(16,185,129,.15);border:1.5px solid rgba(16,185,129,.3);color:#34d399;font-weight:800;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s;position:relative;overflow:hidden;}
.btn-know:hover{background:rgba(16,185,129,.25);transform:translateY(-2px);}
.btn-know:active{transform:scale(.96);}
.btn-dontknow{flex:1;padding:13px;border-radius:13px;background:rgba(239,68,68,.1);border:1.5px solid rgba(239,68,68,.2);color:#f87171;font-weight:800;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s;position:relative;overflow:hidden;}
.btn-dontknow:hover{background:rgba(239,68,68,.2);transform:translateY(-2px);}
.btn-dontknow:active{transform:scale(.96);}

/* progress dots */
.pdots{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;padding:4px 0;}
.pdot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.12);transition:all .3s;}
.pdot.cur{background:#0ea5e9;transform:scale(1.4);}
.pdot.kn{background:#10b981;}
.pdot.unk{background:rgba(239,68,68,.5);}

/* list mode */
.wcard{display:flex;align-items:center;gap:14px;padding:13px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:13px;margin-bottom:8px;cursor:pointer;transition:all .2s;}
.wcard:hover{background:rgba(14,165,233,.08);border-color:rgba(14,165,233,.25);}
.wcard.known{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.06);}
.wcard-gu{font-family:'Noto Sans Gujarati',sans-serif;font-size:20px;font-weight:700;color:#38bdf8;min-width:100px;}
.wcard-en{font-size:13px;color:rgba(255,255,255,.7);}
.wcard-ex{font-family:'Noto Sans Gujarati',sans-serif;font-size:12px;color:rgba(255,255,255,.3);margin-top:3px;}
.chk{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(255,255,255,.15);transition:all .2s;flex-shrink:0;}
.chk.on{background:rgba(16,185,129,.2);border-color:rgba(16,185,129,.4);}

/* bottom bar */
.bbar{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(7,6,26,.94);backdrop-filter:blur(22px);border-top:1px solid rgba(14,165,233,.2);padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom,12px));}
.bbar-in{max-width:680px;margin:0 auto;display:flex;flex-direction:column;gap:8px;}
.btn-complete{background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;font-weight:800;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border-radius:13px;padding:13px 20px;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .25s;box-shadow:0 6px 24px rgba(14,165,233,.4);position:relative;overflow:hidden;}
.btn-complete:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(14,165,233,.6);}
.btn-complete:active{transform:scale(.97);}
.stats-row{display:flex;gap:8px;justify-content:center;}
.stat-c{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;}

#ov{display:none;position:fixed;inset:0;z-index:900;background:rgba(4,3,14,.92);backdrop-filter:blur(20px);align-items:center;justify-content:center;padding:20px;}
#ov.show{display:flex;}
.ov-card{background:linear-gradient(145deg,#1a1532,#0d0b1e);border:1.5px solid rgba(14,165,233,.4);border-radius:24px;padding:38px 28px;text-align:center;max-width:340px;width:100%;animation:popin .45s cubic-bezier(.34,1.4,.64,1);}
@keyframes popin{from{opacity:0;transform:scale(.75);}to{opacity:1;transform:scale(1);}}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.18);transform:scale(0);animation:rip .55s linear;pointer-events:none;}
@keyframes rip{to{transform:scale(4);opacity:0;}}
#fw{position:fixed;inset:0;z-index:800;pointer-events:none;display:none;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:rgba(14,165,233,.3);border-radius:2px;}
</style>
</head>
<body>
<div class="bg-base"></div><div class="bg-grid"></div>
<div class="orb" style="width:360px;height:360px;background:rgba(14,165,233,.16);top:-80px;right:-60px;animation:fl 16s ease-in-out infinite;"></div>
<div class="orb" style="width:240px;height:240px;background:rgba(56,189,248,.1);bottom:10%;left:-40px;animation:fl 20s ease-in-out -10s infinite;"></div>
<canvas id="fw"></canvas>

<div id="ov">
  <div class="ov-card">
    <div style="width:74px;height:74px;border-radius:50%;background:linear-gradient(135deg,#0ea5e9,#0284c7);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 10px 36px rgba(14,165,233,.5);">
      <span class="ms material-symbols-outlined" style="font-size:36px;color:#fff;font-variation-settings:'FILL' 1">abc</span>
    </div>
    <h2 style="font-size:22px;font-weight:900;color:#fff;margin-bottom:6px;">Vocab Complete!</h2>
    <p style="font-size:13px;color:rgba(255,255,255,.4);margin-bottom:16px;" id="ov-nm"></p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">
      <div style="background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);border-radius:12px;padding:13px;">
        <div style="font-size:22px;font-weight:900;color:#34d399;" id="ov-known">0</div>
        <div style="font-size:11px;color:rgba(255,255,255,.3);">Known</div>
      </div>
      <div style="background:rgba(14,165,233,.12);border:1px solid rgba(14,165,233,.25);border-radius:12px;padding:13px;">
        <div style="font-size:22px;font-weight:900;color:#38bdf8;" id="ov-xp">+20</div>
        <div style="font-size:11px;color:rgba(255,255,255,.3);">XP Earned</div>
      </div>
    </div>
    <button onclick="goBack()" style="width:100%;background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;font-weight:800;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border-radius:13px;padding:13px;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;box-shadow:0 6px 22px rgba(14,165,233,.45);" onmouseover="this.style.transform='translateY(-1px)'" onmouseout="this.style.transform='translateY(0)'">
      <span class="ms material-symbols-outlined" style="font-size:18px;font-variation-settings:'FILL' 1">map</span>Back to Roadmap
    </button>
  </div>
</div>

<div class="page">
  <nav class="top-nav">
    <a class="back-btn" href="roadmap.html" id="back-a">
      <span class="ms material-symbols-outlined" style="font-size:20px;">arrow_back</span>
    </a>
    <div style="width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#0ea5e9,#0284c7);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <span class="ms material-symbols-outlined" style="font-size:16px;color:#fff;font-variation-settings:'FILL' 1">abc</span>
    </div>
    <div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" id="nav-title">Vocabulary</div></div>
    <div style="display:flex;gap:6px;flex-shrink:0;">
      <span style="background:rgba(14,165,233,.15);border:1px solid rgba(14,165,233,.3);color:#38bdf8;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:700;" id="nav-ctr">0/0</span>
      <span style="background:rgba(14,165,233,.2);border:1px solid rgba(14,165,233,.3);color:#38bdf8;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:800;" id="nav-xp">⚡20</span>
    </div>
  </nav>
  <div class="prog-track"><div class="prog-fill" id="prog" style="width:0%"></div></div>

  <div class="cmax" style="padding-top:16px;padding-bottom:120px;" id="main-area"></div>
</div>

<div class="bbar">
  <div class="bbar-in">
    <div class="stats-row">
      <div class="stat-c" style="background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.2);color:#34d399;">
        <span class="ms material-symbols-outlined" style="font-size:14px;font-variation-settings:'FILL' 1">check_circle</span>
        <span id="known-cnt">0 known</span>
      </div>
      <div class="stat-c" style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.15);color:#f87171;">
        <span class="ms material-symbols-outlined" style="font-size:14px;font-variation-settings:'FILL' 1">replay</span>
        <span id="review-cnt">0 review</span>
      </div>
    </div>
    <button class="btn-complete" onclick="doComplete()">
      <span class="ms material-symbols-outlined" style="font-size:19px;font-variation-settings:'FILL' 1">check_circle</span>
      <span id="btn-label">Complete Vocabulary</span>
    </button>
  </div>
</div>

<script>
const P=new URLSearchParams(location.search);
const LANG=P.get('lang')||'gujarati',AID=parseInt(P.get('id'))||2,AXP=parseInt(P.get('xp'))||20;
let act=null,cnt=null,words=[],idx=0,mode='flash',knownSet=new Set(),flipped=false;

async function init(){
  const all=LWData.getActivities(LANG);
  outer:for(const m of all)for(const a of m.activities){if(a.id===AID){act=a;break outer;}}
  // BUG #4 FIX: await content
  cnt = await LWInit.loadActivityContent(AID, LANG);
  if(cnt?.blocks)cnt.blocks.forEach(b=>{if(b.type==='vocab_table'&&b.words)words.push(...b.words);});
  document.getElementById('nav-title').textContent=cnt?.title||act?.title||'Vocabulary';
  document.getElementById('nav-xp').textContent='⚡'+(cnt?.xp||act?.xp||AXP);
  if(!words.length){document.getElementById('main-area').innerHTML=skeletonHTML();return;}
  render();updateStats();
}

function render(){
  const area=document.getElementById('main-area');
  if(!words.length){area.innerHTML=skeletonHTML();return;}
  const xp=cnt?.xp||AXP;
  let html=`
  <div style="background:linear-gradient(135deg,rgba(14,165,233,.2),rgba(14,165,233,.06));border:1px solid rgba(14,165,233,.3);border-radius:18px;padding:18px;margin-bottom:18px;animation:fadeup .4s ease both;">
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:48px;height:48px;border-radius:13px;background:linear-gradient(135deg,#0ea5e9,#0284c7);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 6px 20px rgba(14,165,233,.4);">
        <span class="ms material-symbols-outlined" style="font-size:24px;color:#fff;font-variation-settings:'FILL' 1">abc</span>
      </div>
      <div style="flex:1;">
        <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#38bdf8;margin-bottom:3px;">VOCABULARY · ${words.length} words</div>
        <div style="font-size:16px;font-weight:900;color:#fff;">${esc(cnt?.title||'Vocabulary')}</div>
      </div>
      <span style="background:rgba(14,165,233,.2);color:#38bdf8;border:1px solid rgba(14,165,233,.25);border-radius:999px;padding:4px 10px;font-size:11px;font-weight:800;">⚡${xp}</span>
    </div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <div class="mode-tabs">
      <button class="mtab${mode==='flash'?' active':''}" onclick="setMode('flash')">🃏 Flashcards</button>
      <button class="mtab${mode==='list'?' active':''}" onclick="setMode('list')">📋 Word List</button>
    </div>
    <div style="font-size:12px;color:rgba(255,255,255,.3);font-weight:600;" id="ctr-lbl">${idx+1} / ${words.length}</div>
  </div>`;

  if(mode==='flash'){
    const w=words[idx]||{};
    // Parse romanization from word if exists (format: "gu | rom" or just "gu")
    const parts=String(w.word||'').split('|');
    const guText=parts[0].trim();
    const romText=parts[1]?parts[1].trim():'';
    html+=`
    <div class="card-arena" onclick="flipCard()" id="card-arena">
      <div class="fc${flipped?' flipped':''}" id="fc">
        <div class="fc-face fc-front">
          <div class="card-num">Word ${idx+1} of ${words.length} · Tap to reveal</div>
          <div class="card-word gu">${esc(guText)}</div>
          ${romText?`<div class="card-rom">${esc(romText)}</div>`:''}
          <div class="card-hint">👆 Tap to see meaning</div>
        </div>
        <div class="fc-face fc-back">
          <div class="card-num">Meaning</div>
          <div class="card-meaning">${esc(w.meaning||'')}</div>
          ${w.example?`<div class="card-example">${esc(w.example)}</div>`:''}
        </div>
      </div>
    </div>
    <!-- Progress dots -->
    <div class="pdots">${words.map((_,i)=>`<div class="pdot${i===idx?' cur':knownSet.has(i)?' kn':''}" onclick="jumpTo(${i})"></div>`).join('')}</div>
    <!-- Nav & action buttons -->
    <div style="display:flex;gap:9px;margin-top:14px;">
      <button onclick="prev()" style="width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5);transition:all .18s;flex-shrink:0;" onmouseover="this.style.background='rgba(255,255,255,.12)'" onmouseout="this.style.background='rgba(255,255,255,.06)'" ${idx===0?'disabled':''}>
        <span class="ms material-symbols-outlined" style="font-size:18px;">arrow_back</span>
      </button>
      <button class="btn-dontknow" onclick="markCard(false)">
        <span class="ms material-symbols-outlined" style="font-size:18px;">close</span> Still Learning
      </button>
      <button class="btn-know" onclick="markCard(true)">
        <span class="ms material-symbols-outlined" style="font-size:18px;">check</span> I Know It!
      </button>
      <button onclick="next()" style="width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5);transition:all .18s;flex-shrink:0;" onmouseover="this.style.background='rgba(255,255,255,.12)'" onmouseout="this.style.background='rgba(255,255,255,.06)'" ${idx>=words.length-1?'disabled':''}>
        <span class="ms material-symbols-outlined" style="font-size:18px;">arrow_forward</span>
      </button>
    </div>`;
  } else {
    html+=`<div>${words.map((w,i)=>{
      const parts=String(w.word||'').split('|');const gu=parts[0].trim();
      return`<div class="wcard${knownSet.has(i)?' known':''}" onclick="toggleKnown(${i})">
        <div class="chk${knownSet.has(i)?' on':''}">
          <span class="ms material-symbols-outlined" style="font-size:14px;color:${knownSet.has(i)?'#34d399':'rgba(255,255,255,.25)'};font-variation-settings:'FILL' 1">${knownSet.has(i)?'check':'add'}</span>
        </div>
        <div style="flex:1;">
          <div class="wcard-gu">${esc(gu)}</div>
          <div class="wcard-en">${esc(w.meaning||'')}</div>
          ${w.example?`<div class="wcard-ex">${esc(w.example)}</div>`:''}
        </div>
        <div style="font-size:11px;font-weight:700;color:${knownSet.has(i)?'#34d399':'rgba(255,255,255,.2)'};">${knownSet.has(i)?'✓ Known':'○'}</div>
      </div>`;
    }).join('')}</div>`;
  }

  area.innerHTML=html;
  updateCtr();updateStats();
  // update progress
  const pct=words.length?Math.round((Math.max(idx,knownSet.size)/words.length)*100):0;
  document.getElementById('prog').style.width=pct+'%';
}

function flipCard(){flipped=!flipped;const fc=document.getElementById('fc');if(fc){fc.classList.toggle('flipped',flipped);}}
function markCard(know){if(know)knownSet.add(idx);else knownSet.delete(idx);flipped=false;if(idx<words.length-1){idx++;render();}else updateStats();}
function next(){if(idx<words.length-1){idx++;flipped=false;render();}}
function prev(){if(idx>0){idx--;flipped=false;render();}}
function jumpTo(i){idx=i;flipped=false;render();}
function toggleKnown(i){if(knownSet.has(i))knownSet.delete(i);else knownSet.add(i);render();}
function setMode(m){mode=m;render();}
function updateCtr(){const el=document.getElementById('ctr-lbl');if(el)el.textContent=(idx+1)+' / '+words.length;const n=document.getElementById('nav-ctr');if(n)n.textContent=(idx+1)+'/'+words.length;}
function updateStats(){const k=knownSet.size,u=Math.max(0,idx+1-k);document.getElementById('known-cnt').textContent=k+' known';document.getElementById('review-cnt').textContent=u+' review';}

function doComplete(){
  const xp=cnt?.xp||AXP;const p=LWData.getProgress(LANG);const ids=p.completedIds||[];
  if(!ids.includes(AID))ids.push(AID);LWData.saveProgress(LANG,ids,(p.totalXP||0)+xp);
  document.getElementById('ov-nm').textContent=cnt?.title||act?.title||'Vocabulary';
  document.getElementById('ov-known').textContent=knownSet.size;document.getElementById('ov-xp').textContent='+'+xp+' XP';
  document.getElementById('ov').classList.add('show');launchFW();
}
function goBack(){const p=LWData.getProgress(LANG);const d=(p.completedIds||[]).includes(AID);window.location.href='roadmap.html?lang='+LANG+(d?'&completed='+AID+'&xp='+(cnt?.xp||AXP):'');}
function skeletonHTML(){return`<div style="background:rgba(14,165,233,.06);border:1px solid rgba(14,165,233,.15);border-radius:18px;padding:48px 20px;text-align:center;margin:16px 0;"><span class="ms material-symbols-outlined" style="font-size:52px;color:rgba(14,165,233,.3);font-variation-settings:'FILL' 1">flip</span><h2 style="font-size:17px;font-weight:800;color:rgba(255,255,255,.45);margin:14px 0 8px;">Flashcards Coming Soon</h2><p style="font-size:13px;color:rgba(255,255,255,.3);max-width:260px;margin:0 auto 22px;line-height:1.7;">Vocabulary words are being prepared. Mark complete to earn XP!</p><button onclick="doComplete()" style="background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;font-weight:800;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border-radius:12px;padding:12px 22px;font-size:14px;display:inline-flex;align-items:center;gap:8px;"><span class="ms material-symbols-outlined" style="font-size:18px;font-variation-settings:'FILL' 1">check_circle</span>Mark Complete</button></div>`;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function launchFW(){const c=document.getElementById('fw');c.style.display='block';c.width=innerWidth;c.height=innerHeight;const ctx=c.getContext('2d');const cols=['#0ea5e9','#38bdf8','#10b981','#f59e0b'];const ps=Array.from({length:90},()=>({x:innerWidth/2+(Math.random()-.5)*250,y:innerHeight*.35,vx:(Math.random()-.5)*13,vy:(Math.random()-.5)*13-5,alpha:1,color:cols[Math.floor(Math.random()*cols.length)],sz:Math.random()*5+2}));const t=()=>{ctx.clearRect(0,0,c.width,c.height);ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.22;p.alpha-=.014;ctx.globalAlpha=Math.max(0,p.alpha);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();});if(ps.some(p=>p.alpha>0))requestAnimationFrame(t);else c.style.display='none';};t();}
init();
</script>
