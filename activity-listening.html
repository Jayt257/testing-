<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Listening · LearnWise</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800;900&family=Inter:wght@300;400;500;600&family=Noto+Sans+Gujarati:wght@400;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="data/roadmap-data.js"></script><script src="data/activities-content.js"></script>
<script src="data/content-bundle.js"></script>
<script src="data/content-loader.js"></script>
<script src="data/lw-init.js"></script>
<script src="data/blocks-renderer.js"></script><script src="data/en-gu-month1.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#07061a;color:#e2e8f0;min-height:100vh;overflow-x:hidden;}
h1,h2,h3,button{font-family:'Plus Jakarta Sans',sans-serif;}
.gu{font-family:'Noto Sans Gujarati',sans-serif;}
.ms{font-variation-settings:'FILL' 0,'wght' 400}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 15% 60%,#001a2c 0%,#0d0b22 50%,#060410 100%);}
.gbg{position:fixed;inset:0;z-index:0;opacity:.35;background:repeating-linear-gradient(0deg,transparent,transparent 47px,rgba(6,182,212,.05) 47px,rgba(6,182,212,.05) 48px),repeating-linear-gradient(90deg,transparent,transparent 47px,rgba(6,182,212,.05) 47px,rgba(6,182,212,.05) 48px);}
.orb{position:fixed;border-radius:50%;filter:blur(90px);z-index:0;}
@keyframes fl{0%,100%{transform:translateY(0);}50%{transform:translateY(-28px);}}
.page{position:relative;z-index:1;}
.nav{position:sticky;top:0;z-index:50;background:rgba(7,6,26,.9);backdrop-filter:blur(22px);border-bottom:1px solid rgba(6,182,212,.2);height:56px;display:flex;align-items:center;padding:0 16px;gap:10px;}
.back{width:34px;height:34px;border-radius:9px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.55);text-decoration:none;transition:all .18s;flex-shrink:0;}
.back:hover{background:rgba(255,255,255,.13);color:#fff;}
.pbar{height:3px;background:rgba(255,255,255,.06);}
.pfill{height:3px;background:linear-gradient(90deg,#06b6d4,#22d3ee);transition:width .7s ease;}
.cmax{max-width:700px;margin:0 auto;padding:16px 16px 130px;}

/* Audio player card */
.player-card{background:linear-gradient(135deg,rgba(6,182,212,.2),rgba(6,182,212,.05));border:1px solid rgba(6,182,212,.3);border-radius:22px;padding:24px;margin-bottom:18px;}
.track-title{font-size:18px;font-weight:900;color:#fff;margin-bottom:4px;}
.track-sub{font-size:13px;color:rgba(34,211,238,.6);}

/* Waveform (decorative) */
.waveform{display:flex;align-items:center;gap:3px;height:60px;margin:18px 0;cursor:pointer;}
.wbar{border-radius:2px;background:rgba(6,182,212,.3);transition:background .2s;}
.wbar.played{background:rgba(34,211,238,.8);}
.wbar:hover{background:rgba(34,211,238,.6);}

/* Player controls */
.controls{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.btn-play-main{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#06b6d4,#0891b2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(6,182,212,.5);transition:all .2s;flex-shrink:0;position:relative;overflow:hidden;}
.btn-play-main:hover{transform:scale(1.08);box-shadow:0 10px 32px rgba(6,182,212,.65);}
.btn-play-main:active{transform:scale(.93);}
.btn-ctrl{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);transition:all .18s;}
.btn-ctrl:hover{background:rgba(6,182,212,.15);border-color:rgba(6,182,212,.3);color:#22d3ee;}
.time-bar{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px;cursor:pointer;position:relative;overflow:hidden;}
.time-fill{height:100%;background:linear-gradient(90deg,#06b6d4,#22d3ee);border-radius:2px;transition:width .3s linear;}
.time-txt{font-size:11px;font-weight:700;color:rgba(255,255,255,.3);white-space:nowrap;}

/* Speed + loop controls */
.ctrl-chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px;}
.cchip{padding:6px 12px;border-radius:999px;background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.2);font-size:12px;font-weight:700;cursor:pointer;color:rgba(34,211,238,.8);transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif;}
.cchip:hover{background:rgba(6,182,212,.22);}
.cchip.active{background:rgba(6,182,212,.3);border-color:#06b6d4;}

/* Transcript */
.transcript-toggle{display:flex;align-items:center;gap:8px;padding:12px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;cursor:pointer;font-size:13px;font-weight:700;color:rgba(255,255,255,.45);transition:all .2s;}
.transcript-toggle:hover{background:rgba(6,182,212,.06);color:rgba(255,255,255,.7);}
.trans-body{overflow:hidden;max-height:0;transition:max-height .4s ease;}
.trans-body.open{max-height:800px;}
.trans-inner{background:rgba(6,182,212,.05);border:1px solid rgba(6,182,212,.15);border-radius:0 0 12px 12px;padding:16px;font-size:14px;line-height:2.1;color:rgba(255,255,255,.65);}
.gu-t{font-family:'Noto Sans Gujarati',sans-serif;color:#22d3ee;font-size:1.05em;}

/* Q accordion */
.qa-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:14px;margin-bottom:9px;overflow:hidden;transition:border-color .2s;}
.qa-card.open{border-color:rgba(6,182,212,.3);}
.qa-head{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;}
.qa-num{width:28px;height:28px;border-radius:50%;background:rgba(6,182,212,.15);border:1px solid rgba(6,182,212,.3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#22d3ee;flex-shrink:0;}
.qa-body{padding:0 16px;max-height:0;overflow:hidden;transition:max-height .35s ease,padding .25s;}
.qa-card.open .qa-body{max-height:200px;padding:0 16px 14px;}
.qa-ans{background:rgba(6,182,212,.07);border:1px solid rgba(6,182,212,.18);border-radius:10px;padding:12px 14px;font-size:13px;color:rgba(255,255,255,.65);line-height:1.7;}

/* Bottom bar */
.bbar{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(7,6,26,.94);backdrop-filter:blur(22px);border-top:1px solid rgba(6,182,212,.2);padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom,12px));}
.binner{max-width:700px;margin:0 auto;}
.btn-done{width:100%;background:linear-gradient(135deg,#06b6d4,#0891b2);color:#fff;font-weight:800;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border-radius:13px;padding:13px;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .25s;box-shadow:0 6px 24px rgba(6,182,212,.4);position:relative;overflow:hidden;}
.btn-done:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(6,182,212,.6);}
.btn-done:active{transform:scale(.97);}
#ov{display:none;position:fixed;inset:0;z-index:900;background:rgba(4,3,14,.92);backdrop-filter:blur(20px);align-items:center;justify-content:center;padding:20px;}
#ov.show{display:flex;}
.ocard{background:linear-gradient(145deg,#1a1532,#0d0b1e);border:1.5px solid rgba(6,182,212,.4);border-radius:24px;padding:38px 28px;text-align:center;max-width:340px;width:100%;animation:popin .45s cubic-bezier(.34,1.4,.64,1);}
@keyframes popin{from{opacity:0;transform:scale(.75);}to{opacity:1;transform:scale(1);}}
@keyframes fadeup{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
#fw{position:fixed;inset:0;z-index:800;pointer-events:none;display:none;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:rgba(6,182,212,.3);border-radius:2px;}
</style>
</head>
<body>
<div class="bg"></div><div class="gbg"></div>
<div class="orb" style="width:360px;height:360px;background:rgba(6,182,212,.14);bottom:-80px;left:-60px;animation:fl 16s ease-in-out infinite;"></div>
<div class="orb" style="width:240px;height:240px;background:rgba(34,211,238,.09);top:10%;right:-40px;animation:fl 20s ease-in-out -10s infinite;"></div>
<canvas id="fw"></canvas>
<div id="ov">
  <div class="ocard">
    <div style="width:74px;height:74px;border-radius:50%;background:linear-gradient(135deg,#06b6d4,#0891b2);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 10px 36px rgba(6,182,212,.5);">
      <span class="ms material-symbols-outlined" style="font-size:36px;color:#fff;font-variation-settings:'FILL' 1">headphones</span>
    </div>
    <h2 style="font-size:22px;font-weight:900;color:#fff;margin-bottom:6px;">Listening Complete!</h2>
    <p style="font-size:13px;color:rgba(255,255,255,.4);margin-bottom:16px;" id="ov-nm"></p>
    <div style="font-size:38px;font-weight:900;background:linear-gradient(135deg,#22d3ee,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:22px;" id="ov-xp">+40 XP</div>
    <button onclick="goBack()" style="width:100%;background:linear-gradient(135deg,#06b6d4,#0891b2);color:#fff;font-weight:800;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border-radius:13px;padding:13px;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .2s;box-shadow:0 6px 22px rgba(6,182,212,.45);" onmouseover="this.style.transform='translateY(-1px)'" onmouseout="this.style.transform='translateY(0)'">
      <span class="ms material-symbols-outlined" style="font-size:18px;font-variation-settings:'FILL' 1">map</span> Back to Roadmap
    </button>
  </div>
</div>

<div class="page">
  <nav class="nav">
    <a class="back" href="roadmap.html" id="back-a"><span class="ms material-symbols-outlined" style="font-size:20px;">arrow_back</span></a>
    <div style="width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#06b6d4,#0891b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <span class="ms material-symbols-outlined" style="font-size:16px;color:#fff;font-variation-settings:'FILL' 1">headphones</span>
    </div>
    <div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:800;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" id="nav-title">Listening</div></div>
    <div style="display:flex;gap:6px;flex-shrink:0;">
      <span style="background:rgba(6,182,212,.15);border:1px solid rgba(6,182,212,.3);color:#22d3ee;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:700;" id="nav-tm">0:00</span>
      <span style="background:rgba(6,182,212,.2);border:1px solid rgba(6,182,212,.3);color:#22d3ee;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:800;" id="nav-xp">⚡40</span>
    </div>
  </nav>
  <div class="pbar"><div class="pfill" id="prog" style="width:0%"></div></div>
  <div class="cmax" id="content"></div>
</div>

<div class="bbar">
  <div class="binner">
    <button class="btn-done" onclick="doComplete()">
      <span class="ms material-symbols-outlined" style="font-size:19px;font-variation-settings:'FILL' 1">check_circle</span>
      Complete Listening
    </button>
  </div>
</div>

<script>
const P=new URLSearchParams(location.search);
const LANG=P.get('lang')||'gujarati',AID=parseInt(P.get('id'))||6,AXP=parseInt(P.get('xp'))||40;
let act=null,cnt=null,playing=false,playTime=0,totalTime=120,transOpen=false,openQs=new Set(),timer=null;

async function init(){
  const all=LWData.getActivities(LANG);
  outer:for(const m of all)for(const a of m.activities){if(a.id===AID){act=a;break outer;}}
  cnt = await LWInit.loadActivityContent(AID, LANG);
  document.getElementById('nav-title').textContent=cnt?.title||act?.title||'Listening';
  document.getElementById('nav-xp').textContent='⚡'+(cnt?.xp||act?.xp||AXP);
  render();
}

function render(){
  const c=document.getElementById('content');
  const xp=cnt?.xp||AXP;
  // Decorative waveform bars
  const barCount=50;const bars=Array.from({length:barCount},(_,i)=>{
    const h=Math.max(8,Math.round(14+Math.abs(Math.sin(i*.35)*28+Math.cos(i*.2)*14)));
    return`<div class="wbar${i<Math.round(barCount*(playTime/totalTime))?' played':''}" style="height:${h}px;flex:1;" onclick="seekTo(${i/barCount})"></div>`;
  }).join('');
  const ab = cnt?.blocks?.find(b=>b.type==='audio');
  const transcript = ab?.transcript || (LANG.includes('gu') || LANG === 'gujarati' ? 
    `(Gujarati audio transcript — coming soon)\n\nThis listening exercise will feature native Gujarati speakers in natural conversations.\n\nTopics for Week 1:\n• Two people meeting for the first time\n• Common greetings: નમસ્તે, આભાર, ઠીક\n• Introductions: names, where from\n\nAudio features:\n• Native pronunciation at natural speed\n• Slow version available\n• Transcript visible for reference` : 
    '(Transcript not available)');

  let tgtLang = LANG.includes('ja') ? 'Japanese' : (LANG.includes('gu') ? 'Gujarati' : 'Target Language');

  const questions = (LANG.includes('gu') || LANG === 'gujarati') ? [
    {q:'What greeting did you hear at the beginning?',a:'The audio begins with "Namaste" (નમસ્તે) — the standard Gujarati greeting.'},
    {q:'How many speakers are in the conversation?',a:'There are two speakers — this is a typical first-meeting dialogue between two strangers.'},
    {q:'What topic does the conversation focus on?',a:'The conversation covers introductions — names, where people are from, and basic pleasantries.'},
  ] : [];  c.innerHTML=`
  <div style="animation:fadeup .4s ease both;">
    <!-- Header -->
    <div style="background:linear-gradient(135deg,rgba(6,182,212,.2),rgba(6,182,212,.06));border:1px solid rgba(6,182,212,.28);border-radius:18px;padding:18px;margin-bottom:18px;">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:48px;height:48px;border-radius:13px;background:linear-gradient(135deg,#06b6d4,#0891b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 6px 20px rgba(6,182,212,.4);">
          <span class="ms material-symbols-outlined" style="font-size:24px;color:#fff;font-variation-settings:'FILL' 1">headphones</span>
        </div>
        <div style="flex:1;">
          <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#22d3ee;margin-bottom:3px;">LISTENING · Week ${cnt?.week||1}</div>
          <div style="font-size:16px;font-weight:900;color:#fff;">${esc(cnt?.title||'Listening Exercise')}</div>
        </div>
        <span style="background:rgba(6,182,212,.15);color:#22d3ee;border:1px solid rgba(6,182,212,.25);border-radius:999px;padding:4px 10px;font-size:11px;font-weight:800;">⚡${xp}</span>
      </div>
    </div>

    <!-- Player -->
    <div class="player-card">
      <div class="track-title">${esc(cnt?.title||'Week 1 Dialogue')}</div>
      <div class="track-sub">Native ${tgtLang} speakers · 2:00 min</div>

      <!-- Waveform -->
      <div class="waveform" id="waveform">${bars}</div>

      <!-- Time bar -->
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
        <span class="time-txt" id="cur-time">0:00</span>
        <div class="time-bar" onclick="seekBarClick(event)">
          <div class="time-fill" id="time-fill" style="width:${(playTime/totalTime)*100}%"></div>
        </div>
        <span class="time-txt">2:00</span>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="btn-ctrl" onclick="skip(-10)" title="Back 10s">
          <span class="ms material-symbols-outlined" style="font-size:20px;">replay_10</span>
        </button>
        <button class="btn-play-main" id="play-btn" onclick="togglePlay()">
          <span class="ms material-symbols-outlined" style="font-size:26px;color:#fff;font-variation-settings:'FILL' 1" id="play-ic">play_arrow</span>
        </button>
        <button class="btn-ctrl" onclick="skip(10)" title="Skip 10s">
          <span class="ms material-symbols-outlined" style="font-size:20px;">forward_10</span>
        </button>
        <div style="flex:1;"></div>
        <div style="font-size:13px;font-weight:700;color:rgba(34,211,238,.8);" id="spd-lbl">1×</div>
      </div>

      <!-- Speed chips -->
      <div class="ctrl-chips">
        <button class="cchip" onclick="setSpeed(.75,this)">0.75×</button>
        <button class="cchip active" onclick="setSpeed(1,this)">1× Normal</button>
        <button class="cchip" onclick="setSpeed(1.5,this)">1.5×</button>
        <button class="cchip" onclick="toggleLoop(this)">🔁 Loop</button>
      </div>
    </div>

    <!-- Tip -->
    <div style="background:rgba(6,182,212,.07);border:1px solid rgba(6,182,212,.18);border-left:3px solid #06b6d4;border-radius:0 12px 12px 0;padding:12px 16px;margin-bottom:18px;display:flex;gap:10px;">
      <span style="font-size:18px;">🎧</span>
      <div style="font-size:13px;color:rgba(34,211,238,.85);line-height:1.7;">Listen at least twice. First for overall understanding, second for specific ${tgtLang} words and phrases. <span style="color:rgba(6,182,212,.5);">Audio integration coming soon 🚧</span></div>
    </div>

    <!-- Transcript -->
    <div style="margin-bottom:18px;">
      <div class="transcript-toggle" onclick="toggleTranscript(this)">
        <span class="ms material-symbols-outlined" style="font-size:18px;color:rgba(6,182,212,.6);">subtitles</span>
        Show / Hide Transcript
        <span class="ms material-symbols-outlined" style="font-size:16px;margin-left:auto;transition:transform .3s;" id="trans-chev">keyboard_arrow_down</span>
      </div>
      <div class="trans-body" id="trans-body">
        <div class="trans-inner">${esc(transcript).replace(/\n/g,'<br>').replace(/([\u0A80-\u0AFF]+)/g,'<span class="gu-t gu">$1</span>')}</div>
      </div>
    </div>

    <!-- Questions -->
    ${questions.length ? `
    <div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.3);margin-bottom:12px;">📝 ${questions.length} Comprehension Questions</div>
    ${questions.map((q,i)=>`
    <div class="qa-card${openQs.has(i)?' open':''}" id="qa${i}">
      <div class="qa-head" onclick="toggleQ(${i})">
        <div class="qa-num">${i+1}</div>
        <div style="flex:1;font-size:14px;font-weight:600;color:rgba(255,255,255,.75);">${esc(q.q)}</div>
        <span class="ms material-symbols-outlined" style="font-size:18px;color:rgba(255,255,255,.3);transition:transform .25s;transform:rotate(${openQs.has(i)?180:0}deg);" id="qchev${i}">keyboard_arrow_down</span>
      </div>
      <div class="qa-body">
        <div class="qa-ans">${esc(q.a)}</div>
      </div>
    </div>`).join('')}
    ` : ''}
  </div>`;
}

let playInterval=null,speed=1,loop=false;
function togglePlay(){
  playing=!playing;const ic=document.getElementById('play-ic');
  ic.textContent=playing?'stop':'play_arrow';
  if(playing){
    playInterval=setInterval(()=>{
      if(playTime>=totalTime){if(loop){playTime=0;}else{playing=false;ic.textContent='play_arrow';clearInterval(playInterval);}return;}
      playTime+=speed*.5;updateTimebar();
    },500);
  } else clearInterval(playInterval);
}
function updateTimebar(){
  const pct=(playTime/totalTime)*100;const fill=document.getElementById('time-fill');const ct=document.getElementById('cur-time');
  if(fill)fill.style.width=pct+'%';
  if(ct){const m=Math.floor(playTime/60);const s=Math.floor(playTime%60);ct.textContent=m+':'+(s<10?'0':'')+s;}
  document.getElementById('nav-tm').textContent=(()=>{const m=Math.floor(playTime/60);const s=Math.floor(playTime%60);return m+':'+(s<10?'0':'')+s;})();
  document.getElementById('prog').style.width=pct+'%';
  // Refresh waveform bars
  const wf=document.getElementById('waveform');if(!wf)return;
  wf.querySelectorAll('.wbar').forEach((b,i)=>{b.classList.toggle('played',i<Math.round(50*(playTime/totalTime)));});
}
function skip(s){playTime=Math.min(totalTime,Math.max(0,playTime+s));updateTimebar();}
function seekTo(pct){playTime=Math.round(pct*totalTime);updateTimebar();}
function seekBarClick(e){const rect=e.currentTarget.getBoundingClientRect();seekTo((e.clientX-rect.left)/rect.width);}
function setSpeed(s,btn){speed=s;document.getElementById('spd-lbl').textContent=s+'×';document.querySelectorAll('.cchip').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function toggleLoop(btn){loop=!loop;btn.classList.toggle('active',loop);}
function toggleTranscript(el){transOpen=!transOpen;const b=document.getElementById('trans-body');const ch=document.getElementById('trans-chev');if(b)b.classList.toggle('open',transOpen);if(ch)ch.style.transform='rotate('+(transOpen?180:0)+'deg)';}
function toggleQ(i){if(openQs.has(i))openQs.delete(i);else openQs.add(i);const card=document.getElementById('qa'+i);const ch=document.getElementById('qchev'+i);if(card)card.classList.toggle('open',openQs.has(i));if(ch)ch.style.transform='rotate('+(openQs.has(i)?180:0)+'deg)';}
function doComplete(){
  const xp=cnt?.xp||AXP;const p=LWData.getProgress(LANG);const ids=p.completedIds||[];
  if(!ids.includes(AID))ids.push(AID);LWData.saveProgress(LANG,ids,(p.totalXP||0)+xp);
  document.getElementById('ov-nm').textContent=cnt?.title||act?.title||'Listening';
  document.getElementById('ov-xp').textContent='+'+xp+' XP';
  document.getElementById('ov').classList.add('show');launchFW();
}
function goBack(){const p=LWData.getProgress(LANG);const d=(p.completedIds||[]).includes(AID);window.location.href='roadmap.html?lang='+LANG+(d?'&completed='+AID+'&xp='+(cnt?.xp||AXP):'');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function launchFW(){const c=document.getElementById('fw');c.style.display='block';c.width=innerWidth;c.height=innerHeight;const ctx=c.getContext('2d');const cols=['#06b6d4','#22d3ee','#10b981','#a78bfa'];const ps=Array.from({length:90},()=>({x:innerWidth/2+(Math.random()-.5)*280,y:innerHeight*.32,vx:(Math.random()-.5)*14,vy:(Math.random()-.5)*14-5,alpha:1,color:cols[~~(Math.random()*cols.length)],sz:Math.random()*5+2}));const t=()=>{ctx.clearRect(0,0,c.width,c.height);ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.22;p.alpha-=.014;ctx.globalAlpha=Math.max(0,p.alpha);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();});if(ps.some(p=>p.alpha>0))requestAnimationFrame(t);else c.style.display='none';};t();}
init();
</script>
