# docker-compose.yml
# Local full-stack testing — runs backend + frontend + postgres together.
#
# ── HOW TO RUN ────────────────────────────────────────────────
#   Windows: double-click start_windows.bat
#   Linux/Mac: docker compose --env-file test.env up --build
#
# ── WHAT OPENS ────────────────────────────────────────────────
#   Frontend:  http://localhost:3000
#   Backend:   http://localhost:8000/api/health
#   API Docs:  http://localhost:8000/docs

version: '3.9'

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: learnwise
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpass123
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI + Uvicorn) ─────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      # ── Fixed for local docker network ──
      DATABASE_URL: postgresql://postgres:localpass123@db:5432/learnwise
      SECRET_KEY: local-test-secret-notforproduction-changeme
      ALLOWED_ORIGINS: http://localhost:3000
      DATA_DIR: data

      # ── From test.env (user-provided secrets) ──
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@learnwise.app}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@Test2026}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      SCORE_THRESHOLD_OVERRIDE: ${SCORE_THRESHOLD_OVERRIDE:--1}

    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount data dir so admin changes persist across restarts during testing
      - ./backend/data:/app/data

  # ── Frontend (Nginx + React SPA) ────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Backend URL as seen from the BROWSER (not from inside Docker network)
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
