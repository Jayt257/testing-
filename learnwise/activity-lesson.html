<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="theme-color" content="#5b4fcf"/>
<meta name="description" content="LearnWise – Interactive Lesson"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Lesson · LearnWise</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;color:#e0ddf5;min-height:100vh;background:#0a0818;overflow-x:hidden;}
h1,h2,h3,h4,h5,button,label{font-family:'Plus Jakarta Sans',sans-serif;}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}

/* BG */
.bg-deep{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 25% 25%,#1a1040 0%,#0d0b22 55%,#060410 100%);}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.3;
  background-image:linear-gradient(rgba(91,79,207,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(91,79,207,0.06) 1px,transparent 1px);
  background-size:48px 48px;}

/* TOP BAR */
.top-bar{position:sticky;top:0;z-index:50;background:rgba(10,8,24,0.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(91,79,207,0.18);padding:0 16px;height:60px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.back-btn{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.55);border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);cursor:pointer;transition:all 0.2s;text-decoration:none;}
.back-btn:hover{background:rgba(255,255,255,0.12);color:white;}
.top-title{font-weight:800;font-size:14px;color:white;flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.xp-pill{display:inline-flex;align-items:center;gap:3px;background:rgba(91,79,207,0.25);color:#a5a0df;border-radius:999px;padding:5px 12px;font-size:12px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;border:1px solid rgba(91,79,207,0.2);}

/* PROGRESS BAR */
.progress-wrap{position:sticky;top:60px;z-index:40;background:rgba(10,8,24,0.85);backdrop-filter:blur(12px);padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.05);}
.progress-track{width:100%;max-width:700px;margin:0 auto;height:8px;border-radius:4px;background:rgba(255,255,255,0.08);overflow:hidden;}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--ac,#5b4fcf),#10b981);transition:width 0.6s cubic-bezier(.4,0,.2,1);width:0%;}
.progress-label{max-width:700px;margin:4px auto 0;display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,0.35);font-weight:600;}

/* CONTENT AREA */
.content{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:24px 16px 120px;}

/* STEP INDICATOR */
.step-indicator{display:flex;align-items:center;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.step-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.12);transition:all 0.3s ease;cursor:pointer;}
.step-dot.active{background:var(--ac,#5b4fcf);box-shadow:0 0 12px var(--ac,#5b4fcf);transform:scale(1.3);}
.step-dot.done{background:#10b981;box-shadow:0 0 8px rgba(16,185,129,0.4);}
.step-line{flex:1;height:2px;background:rgba(255,255,255,0.06);min-width:12px;}

/* SECTION CARD */
.section-card{background:rgba(255,255,255,0.05);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,0.1);border-radius:1.25rem;padding:24px;margin-bottom:20px;animation:fadeUp 0.45s ease both;box-shadow:0 4px 24px rgba(0,0,0,0.3);}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

.section-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.section-icon-wrap{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 16px rgba(0,0,0,0.2);}
.section-title{font-weight:900;font-size:17px;color:white;line-height:1.3;}
.section-content{font-size:14px;line-height:1.75;color:rgba(255,255,255,0.6);margin-bottom:16px;}
.example-box{background:rgba(91,79,207,0.12);border:1px solid rgba(91,79,207,0.22);border-radius:12px;padding:14px 16px;font-size:14px;font-weight:600;color:#c4b5fd;line-height:1.6;}
.example-box::before{content:'💡 Example';display:block;font-size:10px;font-weight:900;letter-spacing:0.1em;color:rgba(165,160,223,0.6);margin-bottom:6px;text-transform:uppercase;}

/* EXERCISE */
.exercise-wrap{margin-top:20px;}
.exercise-card{background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);border-radius:1.25rem;padding:24px;margin-bottom:16px;animation:fadeUp 0.4s ease both;}
.exercise-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:0.1em;padding:4px 10px;border-radius:6px;margin-bottom:12px;}
.exercise-question{font-weight:700;font-size:15px;color:white;margin-bottom:16px;line-height:1.5;}
.exercise-options{display:flex;flex-direction:column;gap:10px;}
.opt-btn{width:100%;text-align:left;padding:14px 16px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.22s cubic-bezier(.34,1.2,.64,1);font-family:'Inter',sans-serif;display:flex;align-items:center;gap:12px;}
.opt-btn.default{background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.75);}
.opt-btn.default:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);transform:translateY(-1px);}
.opt-btn.correct{background:rgba(16,185,129,0.15);border:1.5px solid rgba(16,185,129,0.45);color:#34d399;}
.opt-btn.wrong{background:rgba(239,68,68,0.15);border:1.5px solid rgba(239,68,68,0.45);color:#f87171;}
.opt-btn.reveal{background:rgba(16,185,129,0.08);border:1.5px solid rgba(16,185,129,0.25);color:rgba(255,255,255,0.4);}
.opt-letter{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;}
.opt-btn.default .opt-letter{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);}
.opt-btn.correct .opt-letter{background:rgba(16,185,129,0.3);color:#34d399;}
.opt-btn.wrong .opt-letter{background:rgba(239,68,68,0.3);color:#f87171;}

.fill-input{width:100%;padding:14px 16px;border-radius:12px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.15);color:white;font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s;}
.fill-input:focus{border-color:rgba(91,79,207,0.5);}
.fill-input.correct{border-color:#10b981;background:rgba(16,185,129,0.08);}
.fill-input.wrong{border-color:#ef4444;background:rgba(239,68,68,0.08);}
.fill-check-btn{margin-top:12px;padding:12px 24px;border-radius:12px;background:linear-gradient(135deg,#5b4fcf,#7c6fd4);color:white;font-weight:700;font-size:14px;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:0 4px 16px rgba(91,79,207,0.35);transition:all 0.2s;}
.fill-check-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(91,79,207,0.5);}

.explanation-box{margin-top:12px;padding:12px 16px;border-radius:10px;font-size:13px;line-height:1.6;animation:fadeUp 0.3s ease both;}
.explanation-box.correct-expl{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);color:#6ee7b7;}
.explanation-box.wrong-expl{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#fca5a5;}

/* KEY POINTS */
.key-points{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);border-radius:1.25rem;padding:20px;margin-top:24px;}
.key-points h3{font-weight:900;font-size:14px;color:#fbbf24;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.key-point-item{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;font-size:13px;color:rgba(255,255,255,0.55);line-height:1.5;}
.key-point-bullet{width:6px;height:6px;border-radius:50%;background:#fbbf24;flex-shrink:0;margin-top:6px;}

/* SUMMARY */
.summary-card{background:linear-gradient(135deg,rgba(16,185,129,0.1),rgba(91,79,207,0.1));border:1.5px solid rgba(16,185,129,0.25);border-radius:1.5rem;padding:28px;text-align:center;margin-top:24px;}
.summary-icon{font-size:48px;margin-bottom:12px;}
.summary-title{font-weight:900;font-size:20px;color:white;margin-bottom:8px;}
.summary-text{font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:4px;line-height:1.6;}
.summary-xp{font-size:28px;font-weight:900;color:#a5a0df;margin:16px 0;}
.score-display{display:flex;align-items:center;justify-content:center;gap:20px;margin:16px 0;}
.score-item{text-align:center;}
.score-num{font-size:24px;font-weight:900;}
.score-label{font-size:11px;color:rgba(255,255,255,0.35);margin-top:2px;}

/* NAV BUTTONS */
.nav-btns{display:flex;gap:12px;margin-top:20px;justify-content:center;}
.btn-primary{padding:14px 32px;border-radius:12px;background:linear-gradient(135deg,#5b4fcf,#7c6fd4);color:white;font-weight:800;font-size:15px;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:0 6px 24px rgba(91,79,207,0.45),inset 0 1px 0 rgba(255,255,255,0.15);transition:all 0.22s cubic-bezier(.34,1.2,.64,1);display:flex;align-items:center;gap:8px;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(91,79,207,0.55);}
.btn-secondary{padding:14px 24px;border-radius:12px;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.6);font-weight:700;font-size:14px;border:1px solid rgba(255,255,255,0.1);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all 0.2s;}
.btn-secondary:hover{background:rgba(255,255,255,0.12);color:white;}
.btn-success{padding:14px 32px;border-radius:12px;background:linear-gradient(135deg,#10b981,#059669);color:white;font-weight:800;font-size:15px;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:0 6px 24px rgba(16,185,129,0.45);transition:all 0.22s cubic-bezier(.34,1.2,.64,1);display:flex;align-items:center;gap:8px;}
.btn-success:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(16,185,129,0.55);}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(91,79,207,0.3);border-radius:2px;}

/* LOADING */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:rgba(255,255,255,0.4);}
.loading-spinner{width:40px;height:40px;border:3px solid rgba(91,79,207,0.2);border-top-color:#5b4fcf;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="bg-deep"></div>
<div class="bg-grid"></div>

<!-- TOP BAR -->
<div class="top-bar">
  <a href="roadmap.html" class="back-btn" id="back-btn">
    <span class="material-symbols-outlined" style="font-size:20px;">arrow_back</span>
  </a>
  <div class="top-title" id="top-title">Loading Lesson…</div>
  <div class="xp-pill">
    <span class="material-symbols-outlined" style="font-size:14px;font-variation-settings:'FILL' 1">bolt</span>
    <span id="xp-display">+30</span> XP
  </div>
</div>

<!-- PROGRESS BAR -->
<div class="progress-wrap">
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="progress-label">
    <span id="progress-step">Step 1 of 6</span>
    <span id="progress-pct">0%</span>
  </div>
</div>

<!-- CONTENT -->
<div class="content" id="main-content">
  <div class="loading-state">
    <div class="loading-spinner"></div>
    <div>Loading lesson content…</div>
  </div>
</div>

<script src="data/roadmap-data.js"></script>
<script src="data/activity-content.js"></script>
<script>
'use strict';

// ─── Parse URL params ───
const params = new URLSearchParams(window.location.search);
const langId = params.get('lang') || LWData.getSelectedLanguage();
const actId = parseInt(params.get('id'));

if (isNaN(actId)) { window.location.href = 'roadmap.html'; }

// ─── Load content ───
const contentResult = LWContent.getActivityContent(langId, actId);
const lessonData = contentResult ? contentResult.data : null;

if (!lessonData) {
  document.getElementById('main-content').innerHTML = `
    <div class="loading-state">
      <span class="material-symbols-outlined" style="font-size:48px;color:#ef4444;">error</span>
      <div style="font-weight:700;color:white;">Lesson not found</div>
      <a href="roadmap.html" class="btn-primary" style="margin-top:12px;">← Back to Roadmap</a>
    </div>`;
}

// ─── State ───
const STEPS = { INTRO: 0, SECTIONS_START: 1 }; // sections fill from 1..N, then exercises, then summary
const sections = lessonData ? lessonData.sections : [];
const exercises = lessonData ? lessonData.exercises : [];
const totalSteps = 1 + sections.length + (exercises.length > 0 ? 1 : 0) + 1; // intro + sections + exercises + summary
let currentStep = 0;
let exerciseIdx = 0;
let correctCount = 0;
let answeredCount = 0;
const accentColor = lessonData ? (lessonData.color || '#5b4fcf') : '#5b4fcf';

// Set CSS variable
document.documentElement.style.setProperty('--ac', accentColor);

// ─── Init ───
function init() {
  if (!lessonData) return;
  document.getElementById('top-title').textContent = lessonData.title;
  document.getElementById('xp-display').textContent = '+' + lessonData.xp;
  renderStep();
}

function updateProgress() {
  const pct = Math.round((currentStep / (totalSteps - 1)) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-step').textContent = `Step ${currentStep + 1} of ${totalSteps}`;
}

// ─── Render steps ───
function renderStep() {
  updateProgress();
  const root = document.getElementById('main-content');

  if (currentStep === 0) {
    // INTRO
    root.innerHTML = `
      <div style="text-align:center;padding:20px 0;">
        <div style="width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,${accentColor},${accentColor}bb);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 8px 32px ${accentColor}55;">
          <span class="material-symbols-outlined" style="font-size:36px;color:white;font-variation-settings:'FILL' 1">school</span>
        </div>
        <h1 style="font-weight:900;font-size:24px;color:white;margin-bottom:8px;">${lessonData.title}</h1>
        <p style="font-size:14px;color:rgba(255,255,255,0.45);margin-bottom:12px;">${lessonData.subtitle}</p>
        <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin:20px 0;">
          <div style="padding:8px 16px;border-radius:10px;background:rgba(91,79,207,0.15);border:1px solid rgba(91,79,207,0.25);">
            <div style="font-size:16px;font-weight:900;color:#a5a0df;">⚡ ${lessonData.xp}</div>
            <div style="font-size:10px;color:rgba(255,255,255,0.3);">XP Reward</div>
          </div>
          <div style="padding:8px 16px;border-radius:10px;background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.2);">
            <div style="font-size:16px;font-weight:900;color:#34d399;">⏱ ${lessonData.duration}</div>
            <div style="font-size:10px;color:rgba(255,255,255,0.3);">Duration</div>
          </div>
          <div style="padding:8px 16px;border-radius:10px;background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.2);">
            <div style="font-size:16px;font-weight:900;color:#fbbf24;">📝 ${sections.length}</div>
            <div style="font-size:10px;color:rgba(255,255,255,0.3);">Sections</div>
          </div>
        </div>
        <p style="font-size:13px;color:rgba(255,255,255,0.4);max-width:420px;margin:0 auto 24px;line-height:1.6;">
          This lesson has ${sections.length} teaching sections followed by ${exercises.length} practice exercises. Complete all to earn your XP.
        </p>
        <div class="nav-btns">
          <button class="btn-primary" onclick="nextStep()">
            <span class="material-symbols-outlined" style="font-size:18px;font-variation-settings:'FILL' 1">play_circle</span>
            Start Lesson
          </button>
        </div>
      </div>`;
  } else if (currentStep <= sections.length) {
    // SECTIONS
    const sec = sections[currentStep - 1];
    root.innerHTML = `
      ${renderStepIndicator()}
      <div class="section-card">
        <div class="section-header">
          <div class="section-icon-wrap" style="background:linear-gradient(135deg,${accentColor},${accentColor}bb);">
            <span class="material-symbols-outlined" style="font-size:20px;color:white;font-variation-settings:'FILL' 1">${sec.icon || 'school'}</span>
          </div>
          <div>
            <div style="font-size:10px;font-weight:900;color:${accentColor};text-transform:uppercase;letter-spacing:0.1em;margin-bottom:2px;">Section ${currentStep} of ${sections.length}</div>
            <div class="section-title">${sec.title}</div>
          </div>
        </div>
        <div class="section-content">${sec.content}</div>
        ${sec.example ? `<div class="example-box">${sec.example}</div>` : ''}
      </div>
      <div class="nav-btns">
        <button class="btn-secondary" onclick="prevStep()">← Back</button>
        <button class="btn-primary" onclick="nextStep()">
          ${currentStep === sections.length ? 'Start Exercises →' : 'Next Section →'}
        </button>
      </div>`;
  } else if (currentStep === sections.length + 1 && exercises.length > 0) {
    // EXERCISES
    root.innerHTML = `
      ${renderStepIndicator()}
      <div style="text-align:center;margin-bottom:20px;">
        <div style="font-size:10px;font-weight:900;color:#a5a0df;text-transform:uppercase;letter-spacing:0.12em;">Practice Exercises</div>
        <div style="font-weight:900;font-size:18px;color:white;margin-top:4px;">Question ${exerciseIdx + 1} of ${exercises.length}</div>
      </div>
      <div id="exercise-container"></div>
      <div id="exercise-nav" style="margin-top:16px;"></div>`;
    renderExercise();
  } else {
    // SUMMARY
    const score = exercises.length > 0 ? Math.round((correctCount / exercises.length) * 100) : 100;
    root.innerHTML = `
      ${renderStepIndicator()}
      <div class="summary-card">
        <div class="summary-icon">🎉</div>
        <div class="summary-title">Lesson Complete!</div>
        <div class="summary-text">${lessonData.summary}</div>
        <div class="summary-xp">⚡ +${lessonData.xp} XP</div>
        ${exercises.length > 0 ? `
        <div class="score-display">
          <div class="score-item">
            <div class="score-num" style="color:#34d399;">${correctCount}</div>
            <div class="score-label">Correct</div>
          </div>
          <div class="score-item">
            <div class="score-num" style="color:#f87171;">${exercises.length - correctCount}</div>
            <div class="score-label">Incorrect</div>
          </div>
          <div class="score-item">
            <div class="score-num" style="color:#a5a0df;">${score}%</div>
            <div class="score-label">Score</div>
          </div>
        </div>` : ''}
      </div>
      ${lessonData.keyPoints ? `
      <div class="key-points">
        <h3><span class="material-symbols-outlined" style="font-size:18px;font-variation-settings:'FILL' 1">lightbulb</span> Key Points</h3>
        ${lessonData.keyPoints.map(p => `<div class="key-point-item"><div class="key-point-bullet"></div><span>${p}</span></div>`).join('')}
      </div>` : ''}
      <div class="nav-btns" style="margin-top:24px;">
        <button class="btn-success" onclick="completeLesson()">
          <span class="material-symbols-outlined" style="font-size:18px;font-variation-settings:'FILL' 1">check_circle</span>
          Complete & Return to Roadmap
        </button>
      </div>`;
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderStepIndicator() {
  let html = '<div class="step-indicator">';
  for (let i = 0; i < totalSteps; i++) {
    if (i > 0) html += '<div class="step-line"></div>';
    html += `<div class="step-dot ${i === currentStep ? 'active' : i < currentStep ? 'done' : ''}"></div>`;
  }
  html += '</div>';
  return html;
}

// ─── Exercise rendering ───
function renderExercise() {
  const ex = exercises[exerciseIdx];
  const container = document.getElementById('exercise-container');
  if (!ex) return;

  if (ex.type === 'mcq') {
    const letters = ['A', 'B', 'C', 'D'];
    container.innerHTML = `
      <div class="exercise-card">
        <div class="exercise-badge" style="background:rgba(91,79,207,0.2);color:#a5a0df;">
          <span class="material-symbols-outlined" style="font-size:12px;font-variation-settings:'FILL' 1">quiz</span>
          MULTIPLE CHOICE
        </div>
        <div class="exercise-question">${ex.question}</div>
        <div class="exercise-options">
          ${ex.options.map((opt, i) => `
            <button class="opt-btn default" data-idx="${i}" onclick="selectMCQ(this,${i},${ex.correct})">
              <div class="opt-letter">${letters[i]}</div>
              <span>${opt}</span>
            </button>
          `).join('')}
        </div>
        <div id="expl-${exerciseIdx}"></div>
      </div>`;
  } else if (ex.type === 'fill') {
    container.innerHTML = `
      <div class="exercise-card">
        <div class="exercise-badge" style="background:rgba(245,158,11,0.2);color:#fbbf24;">
          <span class="material-symbols-outlined" style="font-size:12px;font-variation-settings:'FILL' 1">edit</span>
          FILL IN THE BLANK
        </div>
        <div class="exercise-question">${ex.question}</div>
        ${ex.hint ? `<div style="font-size:12px;color:rgba(255,255,255,0.3);margin-bottom:12px;">💡 Hint: ${ex.hint}</div>` : ''}
        <input type="text" class="fill-input" id="fill-input" placeholder="Type your answer…" onkeydown="if(event.key==='Enter')checkFill()"/>
        <button class="fill-check-btn" onclick="checkFill()">Check Answer</button>
        <div id="expl-${exerciseIdx}"></div>
      </div>`;
    setTimeout(() => document.getElementById('fill-input')?.focus(), 100);
  }
  updateExerciseNav();
}

function selectMCQ(btn, selected, correct) {
  const btns = btn.parentElement.querySelectorAll('.opt-btn');
  if (btn.classList.contains('correct') || btn.classList.contains('wrong')) return;
  
  btns.forEach((b, i) => {
    b.classList.remove('default');
    if (i === correct) b.classList.add('correct');
    else if (i === selected) b.classList.add('wrong');
    else b.classList.add('reveal');
    b.style.pointerEvents = 'none';
  });

  answeredCount++;
  if (selected === correct) correctCount++;

  const ex = exercises[exerciseIdx];
  const explEl = document.getElementById(`expl-${exerciseIdx}`);
  if (explEl && ex.explanation) {
    explEl.innerHTML = `<div class="explanation-box ${selected === correct ? 'correct-expl' : 'wrong-expl'}">
      <strong>${selected === correct ? '✓ Correct!' : '✗ Incorrect.'}</strong> ${ex.explanation}
    </div>`;
  }
  updateExerciseNav(true);
}

function checkFill() {
  const input = document.getElementById('fill-input');
  if (!input || !input.value.trim()) return;
  
  const ex = exercises[exerciseIdx];
  const userAnswer = input.value.trim().toLowerCase();
  const correctAnswer = ex.answer.toLowerCase();
  const isCorrect = userAnswer === correctAnswer;

  input.classList.add(isCorrect ? 'correct' : 'wrong');
  input.disabled = true;
  document.querySelector('.fill-check-btn').style.display = 'none';

  answeredCount++;
  if (isCorrect) correctCount++;

  const explEl = document.getElementById(`expl-${exerciseIdx}`);
  if (explEl) {
    explEl.innerHTML = `<div class="explanation-box ${isCorrect ? 'correct-expl' : 'wrong-expl'}">
      <strong>${isCorrect ? '✓ Correct!' : `✗ Incorrect. The answer is: "${ex.answer}"`}</strong>
      ${ex.explanation ? ' — ' + ex.explanation : ''}
    </div>`;
  }
  updateExerciseNav(true);
}

function updateExerciseNav(answered = false) {
  const nav = document.getElementById('exercise-nav');
  if (!nav) return;
  
  if (answered) {
    if (exerciseIdx < exercises.length - 1) {
      nav.innerHTML = `<div class="nav-btns"><button class="btn-primary" onclick="nextExercise()">Next Question →</button></div>`;
    } else {
      nav.innerHTML = `<div class="nav-btns"><button class="btn-success" onclick="nextStep()">
        <span class="material-symbols-outlined" style="font-size:18px;font-variation-settings:'FILL' 1">check_circle</span>
        See Results
      </button></div>`;
    }
  } else {
    nav.innerHTML = `<div style="font-size:12px;color:rgba(255,255,255,0.25);text-align:center;">Answer to continue</div>`;
  }
}

function nextExercise() {
  exerciseIdx++;
  renderExercise();
  window.scrollTo({ top: 200, behavior: 'smooth' });
}

// ─── Navigation ───
function nextStep() {
  if (currentStep < totalSteps - 1) {
    currentStep++;
    renderStep();
  }
}

function prevStep() {
  if (currentStep > 0) {
    currentStep--;
    if (currentStep === sections.length + 1) exerciseIdx = 0; // reset exercises if going back
    renderStep();
  }
}

// ─── Complete ───
function completeLesson() {
  window.location.href = `roadmap.html?completed=${actId}&xp=${lessonData.xp}&lang=${langId}`;
}

// Boot
init();
</script>
</body>
</html>
