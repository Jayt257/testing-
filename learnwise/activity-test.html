<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="theme-color" content="#ef4444"/>
<meta name="description" content="LearnWise – Quick Test"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Quiz · LearnWise</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;color:#e0ddf5;min-height:100vh;background:#0a0818;overflow-x:hidden;}
h1,h2,h3,h4,h5,button,label{font-family:'Plus Jakarta Sans',sans-serif;}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
.bg-deep{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 25% 25%,#1a1018 0%,#0d0b22 55%,#060410 100%);}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.3;background-image:linear-gradient(rgba(239,68,68,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(239,68,68,0.05) 1px,transparent 1px);background-size:48px 48px;}

.top-bar{position:sticky;top:0;z-index:50;background:rgba(10,8,24,0.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(239,68,68,0.18);padding:0 16px;height:60px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.back-btn{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.55);border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);cursor:pointer;transition:all 0.2s;text-decoration:none;}
.back-btn:hover{background:rgba(255,255,255,0.12);color:white;}
.top-title{font-weight:800;font-size:14px;color:white;flex:1;text-align:center;}
.timer-pill{display:inline-flex;align-items:center;gap:4px;background:rgba(239,68,68,0.25);color:#fca5a5;border-radius:999px;padding:5px 14px;font-size:13px;font-weight:700;border:1px solid rgba(239,68,68,0.2);font-family:'Plus Jakarta Sans',sans-serif;}
.timer-pill.warning{background:rgba(239,68,68,0.4);color:#fecaca;animation:pulse-timer 0.5s ease-in-out infinite alternate;}
@keyframes pulse-timer{to{background:rgba(239,68,68,0.55);}}

.progress-wrap{position:sticky;top:60px;z-index:40;background:rgba(10,8,24,0.85);backdrop-filter:blur(12px);padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.05);}
.progress-track{width:100%;max-width:700px;margin:0 auto;height:8px;border-radius:4px;background:rgba(255,255,255,0.08);overflow:hidden;}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#ef4444,#f87171);transition:width 0.4s ease;width:0%;}
.progress-label{max-width:700px;margin:4px auto 0;display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,0.35);font-weight:600;}

.content{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:24px 16px 120px;}
.card{background:rgba(255,255,255,0.05);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,0.1);border-radius:1.25rem;padding:24px;margin-bottom:20px;box-shadow:0 4px 24px rgba(0,0,0,0.3);animation:fadeUp 0.35s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

.q-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:0.1em;padding:4px 10px;border-radius:6px;background:rgba(239,68,68,0.2);color:#f87171;margin-bottom:12px;}
.q-text{font-weight:700;font-size:16px;color:white;margin-bottom:20px;line-height:1.5;}
.q-options{display:flex;flex-direction:column;gap:10px;}
.q-opt{width:100%;text-align:left;padding:14px 16px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.22s cubic-bezier(.34,1.2,.64,1);font-family:'Inter',sans-serif;display:flex;align-items:center;gap:12px;}
.q-opt.default{background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.75);}
.q-opt.default:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);transform:translateY(-1px);}
.q-opt.correct{background:rgba(16,185,129,0.15);border:1.5px solid rgba(16,185,129,0.45);color:#34d399;pointer-events:none;}
.q-opt.wrong{background:rgba(239,68,68,0.15);border:1.5px solid rgba(239,68,68,0.45);color:#f87171;pointer-events:none;}
.q-opt.reveal{background:rgba(16,185,129,0.08);border:1.5px solid rgba(16,185,129,0.25);color:rgba(255,255,255,0.4);pointer-events:none;}
.q-letter{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;}
.q-opt.default .q-letter{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);}
.q-opt.correct .q-letter{background:rgba(16,185,129,0.3);color:#34d399;}
.q-opt.wrong .q-letter{background:rgba(239,68,68,0.3);color:#f87171;}

.fill-input{width:100%;padding:14px 16px;border-radius:12px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.15);color:white;font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s;}
.fill-input:focus{border-color:rgba(239,68,68,0.4);}
.fill-input.correct{border-color:#10b981;background:rgba(16,185,129,0.08);}
.fill-input.wrong{border-color:#ef4444;background:rgba(239,68,68,0.08);}
.fill-check{margin-top:10px;padding:10px 20px;border-radius:10px;background:linear-gradient(135deg,#ef4444,#f87171);color:white;font-weight:700;font-size:13px;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:0 4px 16px rgba(239,68,68,0.3);transition:all 0.2s;}
.fill-check:hover{transform:translateY(-1px);}

.explanation-box{margin-top:12px;padding:12px 16px;border-radius:10px;font-size:13px;line-height:1.6;animation:fadeUp 0.3s ease both;}
.explanation-box.ce{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);color:#6ee7b7;}
.explanation-box.we{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#fca5a5;}

/* RESULT */
.result-card{text-align:center;background:linear-gradient(135deg,rgba(239,68,68,0.08),rgba(91,79,207,0.08));border:1.5px solid rgba(239,68,68,0.2);border-radius:1.5rem;padding:32px;}
.result-ring{width:120px;height:120px;margin:0 auto 20px;position:relative;}
.result-ring svg{transform:rotate(-90deg);}
.result-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.result-score{font-size:32px;font-weight:900;color:white;}
.result-label{font-size:11px;color:rgba(255,255,255,0.3);}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0;}
.result-stat{padding:16px;border-radius:12px;text-align:center;}
.result-num{font-size:22px;font-weight:900;}
.result-stat-label{font-size:10px;color:rgba(255,255,255,0.3);margin-top:4px;}
.grade-badge{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:800;padding:8px 20px;border-radius:10px;margin-bottom:16px;}

.nav-btns{display:flex;gap:12px;margin-top:20px;justify-content:center;}
.btn-success{padding:14px 32px;border-radius:12px;background:linear-gradient(135deg,#10b981,#059669);color:white;font-weight:800;font-size:15px;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:0 6px 24px rgba(16,185,129,0.45);transition:all 0.22s;display:flex;align-items:center;gap:8px;}
.btn-success:hover{transform:translateY(-2px);}
.btn-primary{padding:14px 28px;border-radius:12px;background:linear-gradient(135deg,#ef4444,#f87171);color:white;font-weight:800;font-size:15px;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:0 6px 24px rgba(239,68,68,0.4);transition:all 0.22s;display:flex;align-items:center;gap:8px;}
.btn-primary:hover{transform:translateY(-2px);}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(239,68,68,0.3);border-radius:2px;}
</style>
</head>
<body>
<div class="bg-deep"></div>
<div class="bg-grid"></div>

<div class="top-bar">
  <a href="roadmap.html" class="back-btn"><span class="material-symbols-outlined" style="font-size:20px;">arrow_back</span></a>
  <div class="top-title" id="top-title">Quick Quiz</div>
  <div class="timer-pill" id="timer-pill">
    <span class="material-symbols-outlined" style="font-size:16px;font-variation-settings:'FILL' 1">timer</span>
    <span id="timer-display">8:00</span>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="progress-label"><span id="progress-step">Question 1 of 10</span><span id="progress-pct">0%</span></div>
</div>

<div class="content" id="main-content"></div>

<script src="data/roadmap-data.js"></script>
<script src="data/activity-content.js"></script>
<script>
'use strict';
const params = new URLSearchParams(window.location.search);
const langId = params.get('lang') || LWData.getSelectedLanguage();
const actId = parseInt(params.get('id'));
if (isNaN(actId)) window.location.href = 'roadmap.html';

const contentResult = LWContent.getActivityContent(langId, actId);
const testData = contentResult ? contentResult.data : null;

let currentQ = 0;
let correctCount = 0;
let answeredCount = 0;
let timerSeconds = 0;
let timerInterval = null;
let finished = false;
const questions = testData ? testData.questions : [];

function init() {
  if (!testData || !questions.length) {
    document.getElementById('main-content').innerHTML = '<div style="text-align:center;padding:60px;color:rgba(255,255,255,0.4);"><p style="font-weight:700;color:white;">No quiz found</p><a href="roadmap.html" style="color:#f87171;">Back to Roadmap</a></div>';
    return;
  }
  document.getElementById('top-title').textContent = testData.title;
  timerSeconds = (testData.timeLimit || 8) * 60;
  startTimer();
  renderQ();
}

function startTimer() {
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 60) {
      document.getElementById('timer-pill').classList.add('warning');
    }
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      finishTest();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  document.getElementById('timer-display').textContent = `${m}:${s.toString().padStart(2,'0')}`;
}

function updateProgress() {
  const pct = Math.round((currentQ / questions.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-step').textContent = currentQ >= questions.length ? 'Complete!' : `Question ${currentQ + 1} of ${questions.length}`;
}

function renderQ() {
  if (currentQ >= questions.length || finished) { finishTest(); return; }
  updateProgress();
  const q = questions[currentQ];
  const letters = ['A','B','C','D'];
  const root = document.getElementById('main-content');

  if (q.type === 'mcq') {
    root.innerHTML = `
      <div class="card">
        <div class="q-badge"><span class="material-symbols-outlined" style="font-size:12px;font-variation-settings:'FILL' 1">quiz</span>Question ${currentQ + 1} of ${questions.length}</div>
        <div class="q-text">${q.question}</div>
        <div class="q-options" id="q-opts">
          ${q.options.map((opt, i) => `
            <button class="q-opt default" onclick="answerMCQ(${i},${q.correct})">
              <div class="q-letter">${letters[i]}</div>
              <span>${opt}</span>
            </button>
          `).join('')}
        </div>
        <div id="expl-area"></div>
        <div id="next-area" style="margin-top:16px;"></div>
      </div>`;
  } else if (q.type === 'fill') {
    root.innerHTML = `
      <div class="card">
        <div class="q-badge"><span class="material-symbols-outlined" style="font-size:12px;font-variation-settings:'FILL' 1">edit</span>Question ${currentQ + 1} of ${questions.length}</div>
        <div class="q-text">${q.question}</div>
        ${q.hint ? `<div style="font-size:12px;color:rgba(255,255,255,0.3);margin-bottom:12px;">💡 Hint: ${q.hint}</div>` : ''}
        <input type="text" class="fill-input" id="fill-input" placeholder="Type your answer…" onkeydown="if(event.key==='Enter')checkFill()"/>
        <button class="fill-check" onclick="checkFill()">Check Answer</button>
        <div id="expl-area"></div>
        <div id="next-area" style="margin-top:16px;"></div>
      </div>`;
    setTimeout(() => document.getElementById('fill-input')?.focus(), 100);
  }
}

function answerMCQ(selected, correct) {
  const opts = document.querySelectorAll('#q-opts .q-opt');
  if (opts[0].classList.contains('correct') || opts[0].classList.contains('wrong') || opts[0].classList.contains('reveal')) return;

  opts.forEach((btn, i) => {
    btn.classList.remove('default');
    if (i === correct) btn.classList.add('correct');
    else if (i === selected) btn.classList.add('wrong');
    else btn.classList.add('reveal');
  });

  answeredCount++;
  if (selected === correct) correctCount++;

  showExplanation(selected === correct);
  showNextBtn();
}

function checkFill() {
  const input = document.getElementById('fill-input');
  if (!input || !input.value.trim()) return;
  
  const q = questions[currentQ];
  const isCorrect = input.value.trim().toLowerCase() === q.answer.toLowerCase();

  input.classList.add(isCorrect ? 'correct' : 'wrong');
  input.disabled = true;
  document.querySelector('.fill-check').style.display = 'none';

  answeredCount++;
  if (isCorrect) correctCount++;

  showExplanation(isCorrect, isCorrect ? null : q.answer);
  showNextBtn();
}

function showExplanation(isCorrect, correctAnswer) {
  const q = questions[currentQ];
  const el = document.getElementById('expl-area');
  let text = isCorrect ? '✓ Correct!' : '✗ Incorrect.';
  if (correctAnswer) text += ` The answer is: "${correctAnswer}"`;
  if (q.explanation) text += ` ${q.explanation}`;
  el.innerHTML = `<div class="explanation-box ${isCorrect ? 'ce' : 'we'}">${text}</div>`;
}

function showNextBtn() {
  const el = document.getElementById('next-area');
  if (currentQ < questions.length - 1) {
    el.innerHTML = `<div class="nav-btns"><button class="btn-primary" onclick="nextQ()"><span class="material-symbols-outlined" style="font-size:18px;">navigate_next</span>Next Question</button></div>`;
  } else {
    el.innerHTML = `<div class="nav-btns"><button class="btn-success" onclick="finishTest()"><span class="material-symbols-outlined" style="font-size:18px;font-variation-settings:'FILL' 1">check_circle</span>See Results</button></div>`;
  }
}

function nextQ() {
  currentQ++;
  renderQ();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function finishTest() {
  if (finished) return;
  finished = true;
  clearInterval(timerInterval);
  
  const score = questions.length > 0 ? Math.round((correctCount / questions.length) * 100) : 0;
  const passed = score >= (testData.passingScore || 60);
  const elapsed = (testData.timeLimit || 8) * 60 - timerSeconds;
  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;

  const gradeInfo = score >= 90 ? { grade: 'A+', color: '#34d399', emoji: '🌟', msg: 'Outstanding!' }
    : score >= 80 ? { grade: 'A', color: '#34d399', emoji: '🎉', msg: 'Excellent!' }
    : score >= 70 ? { grade: 'B', color: '#38bdf8', emoji: '👏', msg: 'Well Done!' }
    : score >= 60 ? { grade: 'C', color: '#fbbf24', emoji: '👍', msg: 'Good Work!' }
    : { grade: 'D', color: '#f87171', emoji: '💪', msg: 'Keep Practicing!' };

  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-pct').textContent = '100%';
  document.getElementById('progress-step').textContent = 'Complete!';

  const circumference = 2 * Math.PI * 50;
  const strokeOffset = circumference * (1 - score / 100);

  document.getElementById('main-content').innerHTML = `
    <div class="result-card">
      <div class="grade-badge" style="background:${gradeInfo.color}22;color:${gradeInfo.color};border:1px solid ${gradeInfo.color}44;">
        ${gradeInfo.emoji} ${gradeInfo.msg}
      </div>
      <div style="font-weight:900;font-size:22px;color:white;margin-bottom:4px;">${testData.title}</div>
      <div style="font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:20px;">${passed ? 'You passed the quiz!' : 'You can try again anytime.'}</div>

      <div class="result-ring">
        <svg width="120" height="120" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="8"/>
          <circle cx="60" cy="60" r="50" fill="none" stroke="${gradeInfo.color}" stroke-width="8" stroke-linecap="round"
            stroke-dasharray="${circumference}" stroke-dashoffset="${strokeOffset}"
            style="transition:stroke-dashoffset 1.5s cubic-bezier(.4,0,.2,1);"/>
        </svg>
        <div class="result-text">
          <div class="result-score">${score}%</div>
          <div class="result-label">Score</div>
        </div>
      </div>

      <div class="result-stats">
        <div class="result-stat" style="background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.2);">
          <div class="result-num" style="color:#34d399;">${correctCount}</div>
          <div class="result-stat-label">Correct</div>
        </div>
        <div class="result-stat" style="background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.2);">
          <div class="result-num" style="color:#f87171;">${questions.length - correctCount}</div>
          <div class="result-stat-label">Incorrect</div>
        </div>
        <div class="result-stat" style="background:rgba(91,79,207,0.12);border:1px solid rgba(91,79,207,0.2);">
          <div class="result-num" style="color:#a5a0df;">${mins}:${secs.toString().padStart(2,'0')}</div>
          <div class="result-stat-label">Time</div>
        </div>
      </div>

      <div style="font-size:24px;font-weight:900;color:#fca5a5;margin:8px 0;">⚡ +${testData.xp} XP</div>
    </div>
    <div class="nav-btns" style="margin-top:24px;">
      <button class="btn-success" onclick="completeTest()">
        <span class="material-symbols-outlined" style="font-size:18px;font-variation-settings:'FILL' 1">check_circle</span>
        Complete & Return to Roadmap
      </button>
    </div>`;
}

function completeTest() {
  window.location.href = `roadmap.html?completed=${actId}&xp=${testData.xp}&lang=${langId}`;
}

init();
</script>
</body>
</html>
