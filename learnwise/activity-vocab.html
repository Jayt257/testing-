<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="theme-color" content="#0ea5e9"/>
<meta name="description" content="LearnWise – Vocabulary Flashcards"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Vocabulary · LearnWise</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;color:#e0ddf5;min-height:100vh;background:#0a0818;overflow-x:hidden;}
h1,h2,h3,h4,h5,button,label{font-family:'Plus Jakarta Sans',sans-serif;}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
.bg-deep{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 25% 25%,#1a1040 0%,#0d0b22 55%,#060410 100%);}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.3;background-image:linear-gradient(rgba(14,165,233,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(14,165,233,0.05) 1px,transparent 1px);background-size:48px 48px;}

.top-bar{position:sticky;top:0;z-index:50;background:rgba(10,8,24,0.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(14,165,233,0.18);padding:0 16px;height:60px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.back-btn{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.55);border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);cursor:pointer;transition:all 0.2s;text-decoration:none;}
.back-btn:hover{background:rgba(255,255,255,0.12);color:white;}
.top-title{font-weight:800;font-size:14px;color:white;flex:1;text-align:center;}
.xp-pill{display:inline-flex;align-items:center;gap:3px;background:rgba(14,165,233,0.25);color:#7dd3fc;border-radius:999px;padding:5px 12px;font-size:12px;font-weight:700;border:1px solid rgba(14,165,233,0.2);}

.progress-wrap{position:sticky;top:60px;z-index:40;background:rgba(10,8,24,0.85);backdrop-filter:blur(12px);padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.05);}
.progress-track{width:100%;max-width:700px;margin:0 auto;height:8px;border-radius:4px;background:rgba(255,255,255,0.08);overflow:hidden;}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#0ea5e9,#38bdf8);transition:width 0.6s cubic-bezier(.4,0,.2,1);width:0%;}
.progress-label{max-width:700px;margin:4px auto 0;display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,0.35);font-weight:600;}

.content{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:24px 16px 120px;}

/* FLASHCARD */
.flashcard-container{perspective:1200px;margin:20px auto;max-width:420px;}
.flashcard{width:100%;min-height:300px;position:relative;cursor:pointer;transform-style:preserve-3d;transition:transform 0.6s cubic-bezier(.4,0,.2,1);}
.flashcard.flipped{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:1.5rem;padding:32px 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.4);}
.card-front{background:linear-gradient(145deg,rgba(14,165,233,0.18),rgba(10,8,24,0.9));border:1.5px solid rgba(14,165,233,0.3);}
.card-back{background:linear-gradient(145deg,rgba(16,185,129,0.15),rgba(10,8,24,0.9));border:1.5px solid rgba(16,185,129,0.3);transform:rotateY(180deg);}
.card-word{font-size:32px;font-weight:900;color:white;margin-bottom:8px;line-height:1.3;}
.card-transliteration{font-size:16px;color:rgba(255,255,255,0.4);margin-bottom:12px;font-style:italic;}
.card-category{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;padding:4px 12px;border-radius:6px;margin-bottom:16px;}
.card-meaning{font-size:20px;font-weight:800;color:white;margin-bottom:12px;}
.card-example{font-size:14px;color:rgba(255,255,255,0.5);line-height:1.6;padding:12px 16px;border-radius:10px;background:rgba(255,255,255,0.05);width:100%;margin-top:8px;}
.card-flip-hint{font-size:12px;color:rgba(255,255,255,0.25);margin-top:16px;display:flex;align-items:center;gap:4px;}
.card-number{font-size:13px;font-weight:700;color:rgba(255,255,255,0.3);margin-bottom:24px;}

/* DIFFICULTY BUTTONS */
.difficulty-btns{display:flex;gap:10px;justify-content:center;margin-top:24px;flex-wrap:wrap;}
.diff-btn{padding:12px 20px;border-radius:12px;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;border:none;font-family:'Plus Jakarta Sans',sans-serif;display:flex;align-items:center;gap:6px;flex:1;justify-content:center;min-width:100px;}
.diff-easy{background:rgba(16,185,129,0.15);color:#34d399;border:1px solid rgba(16,185,129,0.25);}
.diff-easy:hover{background:rgba(16,185,129,0.25);transform:translateY(-1px);}
.diff-medium{background:rgba(245,158,11,0.15);color:#fbbf24;border:1px solid rgba(245,158,11,0.25);}
.diff-medium:hover{background:rgba(245,158,11,0.25);transform:translateY(-1px);}
.diff-hard{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.25);}
.diff-hard:hover{background:rgba(239,68,68,0.25);transform:translateY(-1px);}

/* SUMMARY */
.summary-card{background:linear-gradient(135deg,rgba(14,165,233,0.1),rgba(16,185,129,0.1));border:1.5px solid rgba(14,165,233,0.25);border-radius:1.5rem;padding:28px;text-align:center;margin-top:24px;}
.summary-icon{font-size:48px;margin-bottom:12px;}
.summary-title{font-weight:900;font-size:20px;color:white;margin-bottom:8px;}
.summary-text{font-size:14px;color:rgba(255,255,255,0.5);line-height:1.6;}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0;}
.stat-card{padding:16px;border-radius:12px;text-align:center;}
.stat-num{font-size:24px;font-weight:900;}
.stat-label{font-size:11px;color:rgba(255,255,255,0.3);margin-top:4px;}

.nav-btns{display:flex;gap:12px;margin-top:20px;justify-content:center;}
.btn-primary{padding:14px 32px;border-radius:12px;background:linear-gradient(135deg,#0ea5e9,#38bdf8);color:white;font-weight:800;font-size:15px;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:0 6px 24px rgba(14,165,233,0.45);transition:all 0.22s cubic-bezier(.34,1.2,.64,1);display:flex;align-items:center;gap:8px;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(14,165,233,0.55);}
.btn-success{padding:14px 32px;border-radius:12px;background:linear-gradient(135deg,#10b981,#059669);color:white;font-weight:800;font-size:15px;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:0 6px 24px rgba(16,185,129,0.45);transition:all 0.22s cubic-bezier(.34,1.2,.64,1);display:flex;align-items:center;gap:8px;}
.btn-success:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(16,185,129,0.55);}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(14,165,233,0.3);border-radius:2px;}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:rgba(255,255,255,0.4);}
</style>
</head>
<body>
<div class="bg-deep"></div>
<div class="bg-grid"></div>

<div class="top-bar">
  <a href="roadmap.html" class="back-btn"><span class="material-symbols-outlined" style="font-size:20px;">arrow_back</span></a>
  <div class="top-title" id="top-title">Vocabulary Flashcards</div>
  <div class="xp-pill"><span class="material-symbols-outlined" style="font-size:14px;font-variation-settings:'FILL' 1">bolt</span><span id="xp-display">+20</span> XP</div>
</div>

<div class="progress-wrap">
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="progress-label"><span id="progress-step">Card 1 of 12</span><span id="progress-pct">0%</span></div>
</div>

<div class="content" id="main-content">
  <div class="loading-state"><div style="width:40px;height:40px;border:3px solid rgba(14,165,233,0.2);border-top-color:#0ea5e9;border-radius:50%;animation:spin 0.8s linear infinite;"></div><div>Loading vocabulary…</div></div>
</div>

<script src="data/roadmap-data.js"></script>
<script src="data/activity-content.js"></script>
<script>
'use strict';

const params = new URLSearchParams(window.location.search);
const langId = params.get('lang') || LWData.getSelectedLanguage();
const actId = parseInt(params.get('id'));

if (isNaN(actId)) window.location.href = 'roadmap.html';

const contentResult = LWContent.getActivityContent(langId, actId);
const vocabData = contentResult ? contentResult.data : null;

let currentIdx = 0;
let flipped = false;
let ratings = { easy: 0, medium: 0, hard: 0 };
let completed = false;
const words = vocabData ? vocabData.words : [];

function init() {
  if (!vocabData || !words.length) {
    document.getElementById('main-content').innerHTML = `<div class="loading-state"><span class="material-symbols-outlined" style="font-size:48px;color:#ef4444;">error</span><div style="font-weight:700;color:white;">No vocabulary found</div><a href="roadmap.html" class="btn-primary" style="margin-top:12px;">← Back to Roadmap</a></div>`;
    return;
  }
  document.getElementById('top-title').textContent = vocabData.title;
  document.getElementById('xp-display').textContent = '+' + vocabData.xp;
  renderCard();
}

function updateProgress() {
  const pct = Math.round((currentIdx / words.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-step').textContent = `Card ${currentIdx + 1} of ${words.length}`;
}

function renderCard() {
  if (currentIdx >= words.length) { renderSummary(); return; }
  updateProgress();
  flipped = false;
  const w = words[currentIdx];
  const catColor = getCategoryColor(w.category);

  document.getElementById('main-content').innerHTML = `
    <div class="card-number">Card ${currentIdx + 1} of ${words.length}</div>
    <div class="flashcard-container">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="card-face card-front">
          <div class="card-category" style="background:${catColor}22;color:${catColor};border:1px solid ${catColor}33;">${w.category}</div>
          <div class="card-word">${w.word}</div>
          ${w.transliteration && w.transliteration !== '-' ? `<div class="card-transliteration">${w.transliteration}</div>` : ''}
          <div class="card-flip-hint">
            <span class="material-symbols-outlined" style="font-size:16px;">touch_app</span>
            Tap to reveal meaning
          </div>
        </div>
        <div class="card-face card-back">
          <div class="card-category" style="background:${catColor}22;color:${catColor};border:1px solid ${catColor}33;">${w.category}</div>
          <div class="card-word" style="font-size:24px;">${w.word}</div>
          <div class="card-meaning">${w.meaning}</div>
          <div class="card-example">📝 ${w.example}</div>
        </div>
      </div>
    </div>
    <div id="rate-btns" style="display:none;">
      <div style="text-align:center;font-size:12px;color:rgba(255,255,255,0.3);margin-bottom:8px;">How well did you know this?</div>
      <div class="difficulty-btns">
        <button class="diff-btn diff-easy" onclick="rateCard('easy')">
          <span class="material-symbols-outlined" style="font-size:16px;font-variation-settings:'FILL' 1">sentiment_very_satisfied</span>Easy
        </button>
        <button class="diff-btn diff-medium" onclick="rateCard('medium')">
          <span class="material-symbols-outlined" style="font-size:16px;font-variation-settings:'FILL' 1">sentiment_neutral</span>Medium
        </button>
        <button class="diff-btn diff-hard" onclick="rateCard('hard')">
          <span class="material-symbols-outlined" style="font-size:16px;font-variation-settings:'FILL' 1">sentiment_dissatisfied</span>Hard
        </button>
      </div>
    </div>`;
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('flashcard').classList.toggle('flipped', flipped);
  if (flipped) {
    document.getElementById('rate-btns').style.display = 'block';
  }
}

function rateCard(rating) {
  ratings[rating]++;
  currentIdx++;
  renderCard();
}

function getCategoryColor(cat) {
  const colors = { Greetings:'#5b4fcf', Basics:'#0ea5e9', Pronouns:'#8b5cf6', Essentials:'#10b981', Places:'#f59e0b', Adjectives:'#ec4899', Verbs:'#ef4444', Nouns:'#06b6d4', Actions:'#f97316', Descriptions:'#a855f7', Objects:'#14b8a6', Time:'#eab308' };
  return colors[cat] || '#5b4fcf';
}

function renderSummary() {
  const pct = 100;
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-pct').textContent = '100%';
  document.getElementById('progress-step').textContent = `Complete!`;

  document.getElementById('main-content').innerHTML = `
    <div class="summary-card">
      <div class="summary-icon">🎓</div>
      <div class="summary-title">Vocabulary Complete!</div>
      <div class="summary-text">You reviewed all ${words.length} words. Great work!</div>
      <div style="font-size:28px;font-weight:900;color:#7dd3fc;margin:16px 0;">⚡ +${vocabData.xp} XP</div>
      <div class="stats-grid">
        <div class="stat-card" style="background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.2);">
          <div class="stat-num" style="color:#34d399;">${ratings.easy}</div>
          <div class="stat-label">Easy</div>
        </div>
        <div class="stat-card" style="background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.2);">
          <div class="stat-num" style="color:#fbbf24;">${ratings.medium}</div>
          <div class="stat-label">Medium</div>
        </div>
        <div class="stat-card" style="background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.2);">
          <div class="stat-num" style="color:#f87171;">${ratings.hard}</div>
          <div class="stat-label">Hard</div>
        </div>
      </div>
    </div>
    <div class="nav-btns" style="margin-top:24px;">
      <button class="btn-success" onclick="completeVocab()">
        <span class="material-symbols-outlined" style="font-size:18px;font-variation-settings:'FILL' 1">check_circle</span>
        Complete & Return to Roadmap
      </button>
    </div>`;
}

function completeVocab() {
  window.location.href = `roadmap.html?completed=${actId}&xp=${vocabData.xp}&lang=${langId}`;
}

init();
</script>
</body>
</html>
