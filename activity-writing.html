<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Writing · LearnWise</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800;900&family=Inter:wght@300;400;500;600&family=Noto+Sans+Gujarati:wght@400;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="data/roadmap-data.js"></script><script src="data/activities-content.js"></script>
<script src="data/content-bundle.js"></script>
<script src="data/content-loader.js"></script>
<script src="data/lw-init.js"></script>
<script src="data/blocks-renderer.js"></script><script src="data/en-gu-month1.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#07061a;color:#e2e8f0;min-height:100vh;overflow-x:hidden;}
h1,h2,h3,button{font-family:'Plus Jakarta Sans',sans-serif;}
.ms{font-variation-settings:'FILL' 0,'wght' 400}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 80% 15%,#1f1400 0%,#0d0b22 50%,#060410 100%);}
.gbg{position:fixed;inset:0;z-index:0;opacity:.35;background:repeating-linear-gradient(0deg,transparent,transparent 47px,rgba(245,158,11,.05) 47px,rgba(245,158,11,.05) 48px),repeating-linear-gradient(90deg,transparent,transparent 47px,rgba(245,158,11,.05) 47px,rgba(245,158,11,.05) 48px);}
.orb{position:fixed;border-radius:50%;filter:blur(90px);z-index:0;}
@keyframes fl{0%,100%{transform:translateY(0);}50%{transform:translateY(-28px);}}
.page{position:relative;z-index:1;}
.nav{position:sticky;top:0;z-index:50;background:rgba(7,6,26,.9);backdrop-filter:blur(22px);border-bottom:1px solid rgba(245,158,11,.2);height:56px;display:flex;align-items:center;padding:0 16px;gap:10px;}
.back{width:34px;height:34px;border-radius:9px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.55);text-decoration:none;transition:all .18s;flex-shrink:0;}
.back:hover{background:rgba(255,255,255,.13);color:#fff;}
.pbar{height:3px;background:rgba(255,255,255,.06);}
.pfill{height:3px;background:linear-gradient(90deg,#f59e0b,#fbbf24);transition:width .3s ease;}
.cmax{max-width:720px;margin:0 auto;padding:16px 16px 130px;}

/* Prompt card */
.prompt-card{background:linear-gradient(135deg,rgba(245,158,11,.18),rgba(245,158,11,.05));border:1px solid rgba(245,158,11,.3);border-radius:20px;padding:22px;margin-bottom:18px;}

/* Phrase guide */
.phrase-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:999px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);font-size:12px;cursor:pointer;transition:all .2s;margin:3px;}
.phrase-chip:hover{background:rgba(245,158,11,.22);border-color:rgba(245,158,11,.4);}
.phrase-chip:active{transform:scale(.95);}
.phrase-gu{font-family:'Noto Sans Gujarati',sans-serif;color:#fbbf24;font-weight:700;}
.phrase-en{color:rgba(255,255,255,.45);font-size:11px;}

/* Writing area */
.write-wrap{background:rgba(255,255,255,.04);border:1.5px solid rgba(245,158,11,.2);border-radius:18px;overflow:hidden;transition:border-color .25s;margin-bottom:14px;}
.write-wrap:focus-within{border-color:rgba(245,158,11,.5);box-shadow:0 0 0 3px rgba(245,158,11,.08);}
.write-area{width:100%;min-height:180px;background:transparent;border:none;outline:none;padding:18px;font-size:15px;line-height:1.9;color:rgba(255,255,255,.85);font-family:'Inter',sans-serif;resize:vertical;}
.write-area::placeholder{color:rgba(255,255,255,.2);}
.write-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-top:1px solid rgba(245,158,11,.1);}
.word-ctr{font-size:12px;font-weight:700;transition:color .2s;}
.word-ctr.ok{color:#fbbf24;}
.word-ctr.good{color:#34d399;}

/* Sample answer */
.sample-toggle{display:flex;align-items:center;gap:8px;padding:12px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;cursor:pointer;font-size:13px;font-weight:700;color:rgba(255,255,255,.5);transition:all .2s;-webkit-tap-highlight-color:transparent;}
.sample-toggle:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);}
.sample-body{overflow:hidden;max-height:0;transition:max-height .4s ease;}
.sample-body.open{max-height:600px;}
.sample-inner{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:0 0 12px 12px;padding:16px;font-size:13px;color:rgba(255,255,255,.62);line-height:1.9;white-space:pre-wrap;}
.gu-in-sample{font-family:'Noto Sans Gujarati',sans-serif;color:#fbbf24;font-size:1.05em;}

/* Bottom bar */
.bbar{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(7,6,26,.94);backdrop-filter:blur(22px);border-top:1px solid rgba(245,158,11,.2);padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom,12px));}
.binner{max-width:720px;margin:0 auto;display:flex;gap:9px;}
.btn-sub{flex:1;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;font-weight:800;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border-radius:13px;padding:13px;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .25s;box-shadow:0 6px 24px rgba(245,158,11,.4);position:relative;overflow:hidden;}
.btn-sub:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(245,158,11,.6);}
.btn-sub:active{transform:scale(.97);}
.btn-sub:disabled{opacity:.4;cursor:not-allowed;transform:none!important;}
#ov{display:none;position:fixed;inset:0;z-index:900;background:rgba(4,3,14,.92);backdrop-filter:blur(20px);align-items:center;justify-content:center;padding:20px;}
#ov.show{display:flex;}
.ocard{background:linear-gradient(145deg,#1a1532,#0d0b1e);border:1.5px solid rgba(245,158,11,.4);border-radius:24px;padding:38px 28px;text-align:center;max-width:340px;width:100%;animation:popin .45s cubic-bezier(.34,1.4,.64,1);}
@keyframes popin{from{opacity:0;transform:scale(.75);}to{opacity:1;transform:scale(1);}}
@keyframes fadeup{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.18);transform:scale(0);animation:rp .55s linear;pointer-events:none;}
@keyframes rp{to{transform:scale(4);opacity:0;}}
#fw{position:fixed;inset:0;z-index:800;pointer-events:none;display:none;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:rgba(245,158,11,.3);border-radius:2px;}
</style>
</head>
<body>
<div class="bg"></div><div class="gbg"></div>
<div class="orb" style="width:320px;height:320px;background:rgba(245,158,11,.14);top:-80px;right:-50px;animation:fl 14s ease-in-out infinite;"></div>
<div class="orb" style="width:240px;height:240px;background:rgba(251,191,36,.09);bottom:12%;left:-40px;animation:fl 18s ease-in-out -7s infinite;"></div>
<canvas id="fw"></canvas>
<div id="ov">
  <div class="ocard">
    <div style="width:74px;height:74px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#d97706);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 10px 36px rgba(245,158,11,.5);">
      <span class="ms material-symbols-outlined" style="font-size:36px;color:#fff;font-variation-settings:'FILL' 1">edit_note</span>
    </div>
    <h2 style="font-size:22px;font-weight:900;color:#fff;margin-bottom:6px;">Writing Submitted!</h2>
    <p style="font-size:13px;color:rgba(255,255,255,.4);margin-bottom:16px;" id="ov-nm"></p>
    <div style="font-size:38px;font-weight:900;background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;" id="ov-xp">+35 XP</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">
      <div style="background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);border-radius:12px;padding:12px;"><div style="font-size:20px;font-weight:900;color:#fbbf24;" id="ov-wc">0</div><div style="font-size:11px;color:rgba(255,255,255,.3);">words written</div></div>
      <div style="background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:12px;padding:12px;"><div style="font-size:20px;font-weight:900;color:#34d399;">✓</div><div style="font-size:11px;color:rgba(255,255,255,.3);">submitted</div></div>
    </div>
    <button onclick="goBack()" style="width:100%;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;font-weight:800;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border-radius:13px;padding:13px;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .2s;box-shadow:0 6px 22px rgba(245,158,11,.45);" onmouseover="this.style.transform='translateY(-1px)'" onmouseout="this.style.transform='translateY(0)'">
      <span class="ms material-symbols-outlined" style="font-size:18px;font-variation-settings:'FILL' 1">map</span> Back to Roadmap
    </button>
  </div>
</div>

<div class="page">
  <nav class="nav">
    <a class="back" href="roadmap.html" id="back-a"><span class="ms material-symbols-outlined" style="font-size:20px;">arrow_back</span></a>
    <div style="width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#f59e0b,#d97706);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <span class="ms material-symbols-outlined" style="font-size:16px;color:#fff;font-variation-settings:'FILL' 1">edit_note</span>
    </div>
    <div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:800;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" id="nav-title">Writing</div></div>
    <div style="display:flex;gap:6px;flex-shrink:0;">
      <span style="background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:#fbbf24;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:700;" id="nav-wc">0 words</span>
      <span style="background:rgba(245,158,11,.2);border:1px solid rgba(245,158,11,.3);color:#fbbf24;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:800;" id="nav-xp">⚡35</span>
    </div>
  </nav>
  <div class="pbar"><div class="pfill" id="prog" style="width:0%"></div></div>
  <div class="cmax" id="content"></div>
</div>

<div class="bbar">
  <div class="binner">
    <button class="btn-sub" id="btn-sub" onclick="doSubmit()" disabled>
      <span class="ms material-symbols-outlined" style="font-size:19px;font-variation-settings:'FILL' 1">send</span>
      <span id="btn-txt">Submit Writing</span>
    </button>
  </div>
</div>

<script>
const P=new URLSearchParams(location.search);
const LANG=P.get('lang')||'gujarati',AID=parseInt(P.get('id'))||5,AXP=parseInt(P.get('xp'))||35;
let act=null,cnt=null,minWords=30,sampleOpen=false,submitted=false;

async function init(){
  const all=LWData.getActivities(LANG);
  outer:for(const m of all)for(const a of m.activities){if(a.id===AID){act=a;break outer;}}
  cnt = await LWInit.loadActivityContent(AID, LANG);
  document.getElementById('nav-title').textContent=cnt?.title||act?.title||'Writing';
  document.getElementById('nav-xp').textContent='⚡'+(cnt?.xp||act?.xp||AXP);
  render();
}

function render(){
  const c=document.getElementById('content');
  const xp=cnt?.xp||AXP;
  const wb=cnt?.blocks?.find(b=>b.type==='writing');
  if(!wb&&!cnt){c.innerHTML=skeleton();return;}
  minWords=wb?.minWords||30;
  const prompt=wb?.prompt||'Write a short paragraph in Gujarati (or transliteration) about yourself.';
  const sample=wb?.sampleAnswer||'';
  const textBlocks=cnt?.blocks?.filter(b=>b.type==='text')||[];
  const tipBlocks=cnt?.blocks?.filter(b=>b.type==='tip')||[];

  // Phrase suggestions parsed from text blocks
  const phrases = (LANG.includes('gu') || LANG === 'gujarati') ? [
    {gu:'નમસ્તે!',rom:'Namaste!',en:'Hello!'},
    {gu:'મારું નામ',rom:'Maaru naam',en:'My name is'},
    {gu:'હું ___ થી છું',rom:'Hun ___ thi chhun',en:'I am from'},
    {gu:'ગુજરાતી ભાષા',rom:'Gujarati bhaashaa',en:'Gujarati language'},
    {gu:'ખૂબ ખૂબ આભાર',rom:'Khoob khoob aabhaar',en:'Thank you very much'},
    {gu:'ઠીક છે',rom:'Theek chhe',en:"That's OK"},
  ] : [];

  let html=`
  <div style="animation:fadeup .4s ease both;">
    <!-- Header -->
    <div class="prompt-card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
        <div style="width:48px;height:48px;border-radius:13px;background:linear-gradient(135deg,#f59e0b,#d97706);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 6px 20px rgba(245,158,11,.4);">
          <span class="ms material-symbols-outlined" style="font-size:24px;color:#fff;font-variation-settings:'FILL' 1">edit_note</span>
        </div>
        <div style="flex:1;">
          <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#fbbf24;margin-bottom:3px;">WRITING TASK · Week ${cnt?.week||1}</div>
          <div style="font-size:16px;font-weight:900;color:#fff;">${esc(cnt?.title||'Writing')}</div>
        </div>
      </div>
      <div style="font-size:14px;color:rgba(255,255,255,.72);line-height:1.75;">${esc(prompt)}</div>
      <div style="margin-top:12px;display:flex;align-items:center;gap:8px;">
        <span style="background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.25);border-radius:999px;padding:4px 10px;font-size:11px;font-weight:700;">Minimum: ${minWords} words</span>
        <span style="background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.2);border-radius:999px;padding:4px 10px;font-size:11px;font-weight:700;">⚡ ${xp} XP</span>
      </div>
    </div>`;

  // Tip blocks
  tipBlocks.forEach(t=>{
    html+=`<div style="background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.18);border-left:3px solid #f59e0b;border-radius:0 12px 12px 0;padding:12px 16px;margin-bottom:14px;display:flex;gap:10px;animation:fadeup .4s ease both;">
      <span style="font-size:18px;flex-shrink:0;">💡</span>
      <div style="font-size:13px;color:rgba(251,191,36,.88);line-height:1.72;">${esc(t.body||'').replace(/\n/g,'<br>').replace(/([\u0A80-\u0AFF]+)/g,'<span style="font-family:Noto Sans Gujarati,sans-serif;color:#fbbf24;font-size:1.05em;">$1</span>')}</div>
    </div>`;
  });

  // Phrase guide
  if (phrases.length > 0) {
    html+=`<div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:16px;margin-bottom:16px;">
      <div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.3);margin-bottom:10px;">💬 Tap a phrase to insert it</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;">
        ${phrases.map(p=>`<button class="phrase-chip" onclick="insertPhrase('${esc(p.rom)} ')" title="${esc(p.en)}">
          <span class="phrase-gu">${esc(p.gu)}</span>
          <span class="phrase-en">(${esc(p.rom)})</span>
        </button>`).join('')}
      </div>
    </div>`;
  }

  // Writing area
  const placeholderText = LANG.includes('gu') || LANG === 'gujarati' ? "Start writing here... (mix of English and Gujarati transliteration is fine!)" : "Start writing here...";
  html+=`<div class="write-wrap">
    <textarea class="write-area" id="warea" placeholder="${placeholderText}" oninput="onInput(this)"></textarea>
    <div class="write-footer">
      <div class="word-ctr" id="wctr">0 / ${minWords} words</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button onclick="clearText()" style="font-size:11px;color:rgba(255,255,255,.25);background:none;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;transition:color .2s;" onmouseover="this.style.color='rgba(255,255,255,.5)'" onmouseout="this.style.color='rgba(255,255,255,.25)'">Clear</button>
        <div style="width:1px;height:14px;background:rgba(255,255,255,.1);"></div>
        <div id="status-dot" style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .3s;"></div>
      </div>
    </div>
  </div>`;

  // Sample answer
  if(sample){
    html+=`<div style="margin-bottom:20px;">
      <div class="sample-toggle${sampleOpen?' open':''}" onclick="toggleSample(this)">
        <span class="ms material-symbols-outlined" style="font-size:18px;color:rgba(245,158,11,.6);">lightbulb</span>
        View Sample Answer
        <span class="ms material-symbols-outlined" style="font-size:16px;margin-left:auto;transition:transform .3s;transform:rotate(${sampleOpen?180:0}deg);" id="sample-chev">keyboard_arrow_down</span>
      </div>
      <div class="sample-body${sampleOpen?' open':''}" id="sample-body">
        <div class="sample-inner">${esc(sample).replace(/([\u0A80-\u0AFF]+)/g,'<span class="gu-in-sample">$1</span>').replace(/\n/g,'<br>')}</div>
      </div>
    </div>`;
  }

  html+=`</div>`;
  c.innerHTML=html;

  // Character count live
  const ta=document.getElementById('warea');
  if(ta){ta.addEventListener('input',()=>onInput(ta));}
}

function onInput(ta){
  const words=ta.value.trim().split(/\s+/).filter(w=>w.length>0);
  const wc=words.length;
  const req=minWords;
  document.getElementById('nav-wc').textContent=wc+' words';
  const el=document.getElementById('wctr');
  if(el){el.textContent=wc+' / '+req+' words';el.className='word-ctr'+(wc>=req?' good':wc>=req*.6?' ok':'');}
  const sd=document.getElementById('status-dot');
  if(sd){sd.style.background=wc>=req?'#10b981':wc>=req*.5?'#f59e0b':'rgba(255,255,255,.15)';}
  const btn=document.getElementById('btn-sub');
  if(btn){btn.disabled=wc<req;}
  document.getElementById('prog').style.width=Math.min(100,Math.round((wc/req)*100))+'%';
}
function insertPhrase(text){const ta=document.getElementById('warea');if(!ta)return;const start=ta.selectionStart,end=ta.selectionEnd;ta.value=ta.value.slice(0,start)+text+ta.value.slice(end);ta.focus();ta.selectionStart=ta.selectionEnd=start+text.length;onInput(ta);}
function clearText(){const ta=document.getElementById('warea');if(ta){ta.value='';onInput(ta);ta.focus();}}
function toggleSample(btn){sampleOpen=!sampleOpen;const body=document.getElementById('sample-body');const chev=document.getElementById('sample-chev');if(body)body.classList.toggle('open',sampleOpen);if(chev)chev.style.transform='rotate('+(sampleOpen?180:0)+'deg)';}
function doSubmit(){
  if(submitted)return;
  const ta=document.getElementById('warea');const wc=ta?ta.value.trim().split(/\s+/).filter(w=>w.length>0).length:0;
  if(wc<minWords)return;
  submitted=true;
  const xp=cnt?.xp||AXP;const p=LWData.getProgress(LANG);const ids=p.completedIds||[];
  if(!ids.includes(AID))ids.push(AID);LWData.saveProgress(LANG,ids,(p.totalXP||0)+xp);
  document.getElementById('ov-nm').textContent=cnt?.title||act?.title||'Writing';
  document.getElementById('ov-xp').textContent='+'+xp+' XP';
  document.getElementById('ov-wc').textContent=wc;
  document.getElementById('ov').classList.add('show');launchFW();
}
function goBack(){const p=LWData.getProgress(LANG);const d=(p.completedIds||[]).includes(AID);window.location.href='roadmap.html?lang='+LANG+(d?'&completed='+AID+'&xp='+(cnt?.xp||AXP):'');}
function skeleton(){return`<div style="background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);border-radius:18px;padding:48px 20px;text-align:center;margin:16px 0;"><span class="ms material-symbols-outlined" style="font-size:52px;color:rgba(245,158,11,.3);font-variation-settings:'FILL' 1">edit_note</span><h2 style="font-size:17px;font-weight:800;color:rgba(255,255,255,.45);margin:14px 0 8px;">Writing Prompt Coming Soon</h2><p style="font-size:13px;color:rgba(255,255,255,.3);max-width:260px;margin:0 auto 22px;line-height:1.7;">Writing prompt is being prepared.</p><button onclick="doSubmit()" style="background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;font-weight:800;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border-radius:12px;padding:12px 22px;font-size:14px;display:inline-flex;align-items:center;gap:8px;"><span class="ms material-symbols-outlined" style="font-size:18px;font-variation-settings:'FILL' 1">check_circle</span>Mark Complete</button></div>`;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function launchFW(){const c=document.getElementById('fw');c.style.display='block';c.width=innerWidth;c.height=innerHeight;const ctx=c.getContext('2d');const cols=['#f59e0b','#fbbf24','#10b981','#ec4899'];const ps=Array.from({length:90},()=>({x:innerWidth/2+(Math.random()-.5)*280,y:innerHeight*.32,vx:(Math.random()-.5)*14,vy:(Math.random()-.5)*14-5,alpha:1,color:cols[~~(Math.random()*cols.length)],sz:Math.random()*5+2}));const t=()=>{ctx.clearRect(0,0,c.width,c.height);ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.22;p.alpha-=.014;ctx.globalAlpha=Math.max(0,p.alpha);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();});if(ps.some(p=>p.alpha>0))requestAnimationFrame(t);else c.style.display='none';};t();}
var fw=document.createElement('canvas');fw.id='fw';fw.style.cssText='position:fixed;inset:0;z-index:800;pointer-events:none;display:none;';document.body.appendChild(fw);
init();
</script>
