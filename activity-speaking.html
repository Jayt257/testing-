<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Speaking · LearnWise</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800;900&family=Inter:wght@300;400;500;600&family=Noto+Sans+Gujarati:wght@400;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="data/roadmap-data.js"></script><script src="data/activities-content.js"></script>
<script src="data/content-bundle.js"></script>
<script src="data/content-loader.js"></script>
<script src="data/lw-init.js"></script>
<script src="data/blocks-renderer.js"></script><script src="data/en-gu-month1.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#07061a;color:#e2e8f0;min-height:100vh;overflow-x:hidden;}
h1,h2,h3,button{font-family:'Plus Jakarta Sans',sans-serif;}
.gu{font-family:'Noto Sans Gujarati',sans-serif;}
.ms{font-variation-settings:'FILL' 0,'wght' 400}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 60% 0%,#1a0a3a 0%,#0d0b22 50%,#060410 100%);}
.gbg{position:fixed;inset:0;z-index:0;opacity:.35;background:repeating-linear-gradient(0deg,transparent,transparent 47px,rgba(139,92,246,.05) 47px,rgba(139,92,246,.05) 48px),repeating-linear-gradient(90deg,transparent,transparent 47px,rgba(139,92,246,.05) 47px,rgba(139,92,246,.05) 48px);}
.orb{position:fixed;border-radius:50%;filter:blur(90px);z-index:0;}
@keyframes fl{0%,100%{transform:translateY(0);}50%{transform:translateY(-28px);}}
.page{position:relative;z-index:1;}
.nav{position:sticky;top:0;z-index:50;background:rgba(7,6,26,.9);backdrop-filter:blur(22px);border-bottom:1px solid rgba(139,92,246,.2);height:56px;display:flex;align-items:center;padding:0 16px;gap:10px;}
.back{width:34px;height:34px;border-radius:9px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.55);text-decoration:none;transition:all .18s;flex-shrink:0;}
.back:hover{background:rgba(255,255,255,.13);color:#fff;}
.pbar{height:3px;background:rgba(255,255,255,.06);}
.pfill{height:3px;background:linear-gradient(90deg,#8b5cf6,#a78bfa);transition:width .7s ease;}
.cmax{max-width:700px;margin:0 auto;padding:16px 16px 130px;}

/* Scenario step dots */
.sdots{display:flex;gap:8px;justify-content:center;margin-bottom:18px;}
.sd{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.12);cursor:pointer;transition:all .25s;}
.sd.cur{background:#8b5cf6;transform:scale(1.6);}
.sd.done{background:#10b981;}

/* Scenario card */
.scene-card{background:linear-gradient(135deg,rgba(139,92,246,.18),rgba(139,92,246,.05));border:1px solid rgba(139,92,246,.3);border-radius:22px;padding:22px;margin-bottom:18px;position:relative;overflow:hidden;animation:fadeup .4s ease both;}
.scene-card::after{content:'';position:absolute;top:-60px;right:-60px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,.2),transparent 70%);pointer-events:none;}
.scene-num{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:rgba(167,139,250,.6);margin-bottom:8px;}
.scene-title{font-size:17px;font-weight:900;color:#fff;margin-bottom:10px;line-height:1.35;}
.scene-prompt{font-size:14px;color:rgba(255,255,255,.6);line-height:1.75;}

/* Dialogue bubbles */
.chat-wrap{margin-bottom:18px;}
.bubble-you{background:linear-gradient(135deg,rgba(139,92,246,.25),rgba(139,92,246,.1));border:1px solid rgba(139,92,246,.3);border-radius:18px 18px 4px 18px;padding:12px 16px;margin-bottom:8px;margin-left:20%;}
.bubble-them{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:18px 18px 18px 4px;padding:12px 16px;margin-bottom:8px;margin-right:20%;}
.bubble-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;}
.bubble-text{font-size:14px;line-height:1.65;color:rgba(255,255,255,.75);}
.gu-in-bubble{font-family:'Noto Sans Gujarati',sans-serif;color:#a78bfa;font-size:1.08em;font-weight:600;}

/* Hint chips */
.hints-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
.hint-chip{padding:7px 12px;border-radius:999px;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.22);font-size:13px;cursor:pointer;transition:all .2s;color:rgba(167,139,250,.9);font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;}
.hint-chip:hover{background:rgba(139,92,246,.22);border-color:rgba(139,92,246,.4);}
.hint-chip:active{transform:scale(.95);}
.hint-gu{font-family:'Noto Sans Gujarati',sans-serif;color:#a78bfa;display:block;font-size:14px;margin-bottom:2px;}

/* Record button */
.rec-stage{background:rgba(255,255,255,.04);border:1px solid rgba(139,92,246,.2);border-radius:18px;padding:22px;text-align:center;margin-bottom:18px;}
.btn-rec{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,rgba(139,92,246,.2),rgba(139,92,246,.06));border:2.5px solid rgba(139,92,246,.4);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 12px;transition:all .25s;gap:4px;position:relative;overflow:hidden;}
.btn-rec:hover{background:rgba(139,92,246,.3);transform:scale(1.06);}
.btn-rec:active{transform:scale(.93);}
.btn-rec.on{background:rgba(139,92,246,.4);border-color:#8b5cf6;animation:prec 1.2s ease infinite;}
@keyframes prec{0%,100%{box-shadow:0 0 0 0 rgba(139,92,246,.4);}50%{box-shadow:0 0 0 14px rgba(139,92,246,0);}}
.rec-wave{display:none;justify-content:center;align-items:center;gap:3px;height:32px;margin:8px 0;}
.rec-wave .rb{width:3px;border-radius:2px;background:#8b5cf6;}

/* Bottom nav */
.bbar{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(7,6,26,.94);backdrop-filter:blur(22px);border-top:1px solid rgba(139,92,246,.2);padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom,12px));}
.binner{max-width:700px;margin:0 auto;display:flex;gap:9px;}
.btn-nav2{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5);transition:all .18s;flex-shrink:0;}
.btn-nav2:hover{background:rgba(255,255,255,.12);color:#fff;}
.btn-nxt{flex:1;background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff;font-weight:800;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border-radius:13px;padding:13px;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .25s;box-shadow:0 6px 24px rgba(139,92,246,.4);position:relative;overflow:hidden;}
.btn-nxt:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(139,92,246,.6);}
.btn-nxt:active{transform:scale(.97);}
.btn-nxt.green{background:linear-gradient(135deg,#10b981,#059669);box-shadow:0 6px 24px rgba(16,185,129,.4);}
#ov{display:none;position:fixed;inset:0;z-index:900;background:rgba(4,3,14,.92);backdrop-filter:blur(20px);align-items:center;justify-content:center;padding:20px;}
#ov.show{display:flex;}
.ocard{background:linear-gradient(145deg,#1a1532,#0d0b1e);border:1.5px solid rgba(139,92,246,.4);border-radius:24px;padding:38px 28px;text-align:center;max-width:340px;width:100%;animation:popin .45s cubic-bezier(.34,1.4,.64,1);}
@keyframes popin{from{opacity:0;transform:scale(.75);}to{opacity:1;transform:scale(1);}}
@keyframes fadeup{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
#fw{position:fixed;inset:0;z-index:800;pointer-events:none;display:none;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:rgba(139,92,246,.3);border-radius:2px;}
</style>
</head>
<body>
<div class="bg"></div><div class="gbg"></div>
<div class="orb" style="width:360px;height:360px;background:rgba(139,92,246,.16);top:-100px;left:-60px;animation:fl 15s ease-in-out infinite;"></div>
<div class="orb" style="width:240px;height:240px;background:rgba(167,139,250,.1);bottom:10%;right:-40px;animation:fl 19s ease-in-out -9s infinite;"></div>
<canvas id="fw"></canvas>
<div id="ov">
  <div class="ocard">
    <div style="width:74px;height:74px;border-radius:50%;background:linear-gradient(135deg,#8b5cf6,#7c3aed);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 10px 36px rgba(139,92,246,.5);">
      <span class="ms material-symbols-outlined" style="font-size:36px;color:#fff;font-variation-settings:'FILL' 1">record_voice_over</span>
    </div>
    <h2 style="font-size:22px;font-weight:900;color:#fff;margin-bottom:6px;">Scenarios Complete!</h2>
    <p style="font-size:13px;color:rgba(255,255,255,.4);margin-bottom:16px;" id="ov-nm"></p>
    <div style="font-size:38px;font-weight:900;background:linear-gradient(135deg,#a78bfa,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;" id="ov-xp">+35 XP</div>
    <p style="font-size:12px;color:rgba(255,255,255,.28);margin-bottom:26px;">Great conversation practice! 🗣️</p>
    <button onclick="goBack()" style="width:100%;background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff;font-weight:800;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border-radius:13px;padding:13px;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .2s;box-shadow:0 6px 22px rgba(139,92,246,.45);" onmouseover="this.style.transform='translateY(-1px)'" onmouseout="this.style.transform='translateY(0)'">
      <span class="ms material-symbols-outlined" style="font-size:18px;font-variation-settings:'FILL' 1">map</span> Back to Roadmap
    </button>
  </div>
</div>

<div class="page">
  <nav class="nav">
    <a class="back" href="roadmap.html" id="back-a"><span class="ms material-symbols-outlined" style="font-size:20px;">arrow_back</span></a>
    <div style="width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#8b5cf6,#7c3aed);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <span class="ms material-symbols-outlined" style="font-size:16px;color:#fff;font-variation-settings:'FILL' 1">record_voice_over</span>
    </div>
    <div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:800;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" id="nav-title">Speaking</div></div>
    <div style="display:flex;gap:6px;flex-shrink:0;">
      <span style="background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.3);color:#a78bfa;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:700;" id="nav-sc">1/1</span>
      <span style="background:rgba(139,92,246,.2);border:1px solid rgba(139,92,246,.3);color:#a78bfa;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:800;" id="nav-xp">⚡35</span>
    </div>
  </nav>
  <div class="pbar"><div class="pfill" id="prog" style="width:0%"></div></div>
  <div class="cmax" id="content"></div>
</div>

<div class="bbar">
  <div class="binner">
    <button class="btn-nav2" onclick="prevScene()"><span class="ms material-symbols-outlined" style="font-size:18px;">arrow_back</span></button>
    <button class="btn-nxt" id="btn-nxt" onclick="nextScene()">
      <span class="ms material-symbols-outlined" style="font-size:19px;font-variation-settings:'FILL' 1" id="btn-icon">arrow_forward</span>
      <span id="btn-txt">Next Scenario</span>
    </button>
  </div>
</div>

<script>
const P=new URLSearchParams(location.search);
const LANG=P.get('lang')||'gujarati',AID=parseInt(P.get('id'))||8,AXP=parseInt(P.get('xp'))||35;
let act=null,cnt=null,scenarios=[],cur=0,done=new Set(),recOn=false;

async function init(){
  const all=LWData.getActivities(LANG);
  outer:for(const m of all)for(const a of m.activities){if(a.id===AID){act=a;break outer;}}
  cnt = await LWInit.loadActivityContent(AID, LANG); // BUG #4 FIX
    if(cnt?.blocks)cnt.blocks.forEach(b=>{if(b.type==='speaking')scenarios.push(b);});
    if(!scenarios.length)scenarios=[{type:'speaking',prompt:'Greet someone in Gujarati and ask their name.',hints:['નમસ્તે! (Hello!)','તમારું નામ શું છે? (What\'s your name?)','ખૂબ ખૂબ આભાર! (Thank you very much!)']}];
    document.getElementById('nav-title').textContent=cnt?.title||act?.title||'Speaking';
    document.getElementById('nav-xp').textContent='⚡'+(cnt?.xp||act?.xp||AXP);
    render();
}


function render(){
  const c=document.getElementById('content');
  const s=scenarios[cur]||{};
  const hints=s.hints||[];
  const xp=cnt?.xp||AXP;

  // Build dialogue bubbles from hints (alternate them)
  const dialoguePairs=hints.slice(0,4).map((h,i)=>{
    const parts=h.split('(');const gu=parts[0].trim();const en=parts[1]?parts[1].replace(')','').trim():'';
    return{gu,en,isYou:i%2===0};
  });

  c.innerHTML=`
  <!-- Dots -->
  <div class="sdots">${scenarios.map((_,i)=>`<div class="sd${i===cur?' cur':done.has(i)?' done':''}" onclick="jumpTo(${i})"></div>`).join('')}</div>

  <!-- Header (same for all scenarios) -->
  <div style="background:linear-gradient(135deg,rgba(139,92,246,.18),rgba(139,92,246,.06));border:1px solid rgba(139,92,246,.28);border-radius:18px;padding:18px;margin-bottom:16px;animation:fadeup .35s ease both;">
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:48px;height:48px;border-radius:13px;background:linear-gradient(135deg,#8b5cf6,#7c3aed);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 6px 20px rgba(139,92,246,.4);">
        <span class="ms material-symbols-outlined" style="font-size:24px;color:#fff;font-variation-settings:'FILL' 1">record_voice_over</span>
      </div>
      <div><div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#a78bfa;margin-bottom:3px;">SPEAKING · Week ${cnt?.week||1}</div><div style="font-size:16px;font-weight:900;color:#fff;">${esc(cnt?.title||'Speaking')}</div></div>
      <span style="background:rgba(139,92,246,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.25);border-radius:999px;padding:4px 10px;font-size:11px;font-weight:800;margin-left:auto;">⚡${xp}</span>
    </div>
  </div>

  <!-- Scenario card -->
  <div class="scene-card">
    <div class="scene-num">Scenario ${cur+1} of ${scenarios.length}</div>
    <div class="scene-title">🎭 Role-Play Situation</div>
    <div class="scene-prompt">${esc(s.prompt||'Practice speaking Gujarati in this scenario.')}</div>
  </div>

  <!-- Example dialogue -->
  ${dialoguePairs.length?`
  <div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.3);margin-bottom:12px;">💬 Example Dialogue</div>
  <div class="chat-wrap">
    ${dialoguePairs.map(dp=>`
    <div class="${dp.isYou?'bubble-you':'bubble-them'}">
      <div class="bubble-label" style="color:${dp.isYou?'rgba(167,139,250,.6)':'rgba(255,255,255,.25)'};">${dp.isYou?'You 🧑':'Partner 👤'}</div>
      <div class="bubble-text">
        ${dp.gu?`<span class="gu-in-bubble">${esc(dp.gu)}</span>`:''}
        ${dp.en?`<div style="font-size:12px;color:rgba(255,255,255,.4);margin-top:4px;">${esc(dp.en)}</div>`:''}
      </div>
    </div>`).join('')}
  </div>`:''}

  <!-- Hint chips -->
  ${hints.length?`
  <div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.3);margin-bottom:10px;">💡 Useful Phrases</div>
  <div class="hints-row">
    ${hints.map(h=>{
      const parts=h.split('(');const gu=parts[0].trim();const en=parts[1]?parts[1].replace(')','').trim():'';
      return`<button class="hint-chip" onclick="useHint(this)">
        ${gu?`<span class="hint-gu">${esc(gu)}</span>`:''}
        ${en?`<span>${esc(en)}</span>`:''}
      </button>`;
    }).join('')}
  </div>`:''}

  <!-- Record section -->
  <div class="rec-stage">
    <div style="font-size:13px;font-weight:700;color:rgba(255,255,255,.4);margin-bottom:14px;">🎤 Your Turn — Practice This Scenario</div>
    <button class="btn-rec" id="rec-btn" onclick="toggleRec(this)">
      <span class="ms material-symbols-outlined" style="font-size:30px;color:#8b5cf6;font-variation-settings:'FILL' 1" id="rec-ic">mic</span>
      <span style="font-size:10px;font-weight:800;color:rgba(139,92,246,.7);font-family:'Plus Jakarta Sans',sans-serif;" id="rec-lb">TAP TO RECORD</span>
    </button>
    <div class="rec-wave" id="rec-wave">
      ${Array.from({length:20},()=>`<div class="rb" style="height:${6+Math.random()*24}px;animation:wave ${.4+Math.random()*.6}s ease-in-out ${-(Math.random()*.5)}s infinite alternate;"></div>`).join('')}
    </div>
    <p style="font-size:12px;color:rgba(255,255,255,.22);line-height:1.6;">Read the scenario, think of your response using the hints above, then practice speaking.<br><span style="color:rgba(139,92,246,.4);">AI evaluation coming soon 🚧</span></p>
  </div>`;

  document.getElementById('nav-sc').textContent=(cur+1)+'/'+scenarios.length;
  document.getElementById('prog').style.width=Math.round((done.size/scenarios.length)*100)+'%';
  const last=cur===scenarios.length-1;
  const btn=document.getElementById('btn-nxt');const ic=document.getElementById('btn-icon');const tx=document.getElementById('btn-txt');
  if(last){btn.className='btn-nxt green';ic.textContent='check_circle';tx.textContent='Complete Speaking';}
  else{btn.className='btn-nxt';ic.textContent='arrow_forward';tx.textContent='Next Scenario';}
}

function toggleRec(btn){
  recOn=!recOn;
  const wave=document.getElementById('rec-wave');const ic=document.getElementById('rec-ic');const lb=document.getElementById('rec-lb');
  btn.classList.toggle('on',recOn);wave.style.display=recOn?'flex':'none';
  if(recOn){ic.textContent='stop';lb.textContent='RECORDING...';
    setTimeout(()=>{if(recOn){recOn=false;btn.classList.remove('on');wave.style.display='none';ic.textContent='mic';lb.textContent='RECORDED ✓';lb.style.color='#10b981';done.add(cur);}},3500);
  } else {ic.textContent='mic';lb.textContent='TAP TO RECORD';}
}
function useHint(btn){btn.style.background='rgba(139,92,246,.35)';setTimeout(()=>btn.style.background='',600);}
function nextScene(){done.add(cur);if(cur<scenarios.length-1){cur++;render();window.scrollTo({top:0,behavior:'smooth'});}else doComplete();}
function prevScene(){if(cur>0){cur--;render();window.scrollTo({top:0,behavior:'smooth'});}}
function jumpTo(i){done.add(cur);cur=i;render();}
function doComplete(){
  const xp=cnt?.xp||AXP;const p=LWData.getProgress(LANG);const ids=p.completedIds||[];
  if(!ids.includes(AID))ids.push(AID);LWData.saveProgress(LANG,ids,(p.totalXP||0)+xp);
  document.getElementById('ov-nm').textContent=cnt?.title||act?.title||'Speaking';
  document.getElementById('ov-xp').textContent='+'+xp+' XP';
  document.getElementById('ov').classList.add('show');launchFW();
}
function goBack(){const p=LWData.getProgress(LANG);const d=(p.completedIds||[]).includes(AID);window.location.href='roadmap.html?lang='+LANG+(d?'&completed='+AID+'&xp='+(cnt?.xp||AXP):'');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function launchFW(){const c=document.getElementById('fw');c.style.display='block';c.width=innerWidth;c.height=innerHeight;const ctx=c.getContext('2d');const cols=['#8b5cf6','#a78bfa','#10b981','#ec4899'];const ps=Array.from({length:90},()=>({x:innerWidth/2+(Math.random()-.5)*280,y:innerHeight*.32,vx:(Math.random()-.5)*14,vy:(Math.random()-.5)*14-5,alpha:1,color:cols[~~(Math.random()*cols.length)],sz:Math.random()*5+2}));const t=()=>{ctx.clearRect(0,0,c.width,c.height);ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.22;p.alpha-=.014;ctx.globalAlpha=Math.max(0,p.alpha);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();});if(ps.some(p=>p.alpha>0))requestAnimationFrame(t);else c.style.display='none';};t();}
init();
</script>
</body>
</html>
