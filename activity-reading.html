<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Reading · LearnWise</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800;900&family=Inter:wght@300;400;500;600&family=Noto+Sans+Gujarati:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="data/roadmap-data.js"></script><script src="data/activities-content.js"></script>
<script src="data/content-bundle.js"></script>
<script src="data/content-loader.js"></script>
<script src="data/lw-init.js"></script>
<script src="data/blocks-renderer.js"></script><script src="data/en-gu-month1.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#07061a;color:#e2e8f0;min-height:100vh;overflow-x:hidden;}
h1,h2,h3,button{font-family:'Plus Jakarta Sans',sans-serif;}
.gu{font-family:'Noto Sans Gujarati',sans-serif;}
.ms{font-variation-settings:'FILL' 0,'wght' 400}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 70% at 50% 0%,#0c2714 0%,#0d0b22 50%,#060410 100%);}
.gbg{position:fixed;inset:0;z-index:0;opacity:.35;background:repeating-linear-gradient(0deg,transparent,transparent 47px,rgba(16,185,129,.05) 47px,rgba(16,185,129,.05) 48px),repeating-linear-gradient(90deg,transparent,transparent 47px,rgba(16,185,129,.05) 47px,rgba(16,185,129,.05) 48px);}
.orb{position:fixed;border-radius:50%;filter:blur(90px);z-index:0;}
@keyframes fl{0%,100%{transform:translateY(0);}50%{transform:translateY(-28px);}}
.page{position:relative;z-index:1;}
.nav{position:sticky;top:0;z-index:50;background:rgba(7,6,26,.9);backdrop-filter:blur(22px);border-bottom:1px solid rgba(16,185,129,.2);height:56px;display:flex;align-items:center;padding:0 16px;gap:10px;}
.back{width:34px;height:34px;border-radius:9px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.55);text-decoration:none;transition:all .18s;flex-shrink:0;}
.back:hover{background:rgba(255,255,255,.13);color:#fff;}
.pbar{height:3px;background:rgba(255,255,255,.06);}
.pfill{height:3px;background:linear-gradient(90deg,#10b981,#34d399);transition:width .7s ease;}
.cmax{max-width:720px;margin:0 auto;padding:16px 16px 130px;}

/* Reading passage */
.passage-card{background:rgba(255,255,255,.04);border:1px solid rgba(16,185,129,.2);border-radius:20px;padding:24px;margin-bottom:18px;}
.passage-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:rgba(52,211,153,.6);margin-bottom:8px;}
.passage-text{font-size:15px;line-height:2.1;color:rgba(255,255,255,.72);}
.gu-word{font-family:'Noto Sans Gujarati',sans-serif;color:#34d399;font-size:1.08em;font-weight:600;cursor:pointer;border-bottom:1px dotted rgba(52,211,153,.4);transition:all .15s;position:relative;}
.gu-word:hover{color:#6ee7b7;border-bottom-color:#6ee7b7;}
.gu-para{font-family:'Noto Sans Gujarati',sans-serif;font-size:14px;color:rgba(52,211,153,.55);line-height:2;margin-top:8px;padding-top:8px;border-top:1px solid rgba(16,185,129,.1);}

/* Reading progress */
.read-prog{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.read-fill{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
.read-inner{height:100%;background:linear-gradient(90deg,#10b981,#34d399);border-radius:3px;transition:width .5s ease;}

/* Questions */
.q-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:16px;margin-bottom:10px;overflow:hidden;transition:border-color .2s;}
.q-card.open{border-color:rgba(16,185,129,.3);}
.q-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.q-num{width:28px;height:28px;border-radius:50%;background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#34d399;flex-shrink:0;}
.q-text{flex:1;font-size:14px;font-weight:600;color:rgba(255,255,255,.8);line-height:1.5;}
.q-chev{color:rgba(255,255,255,.3);transition:transform .25s;}
.q-card.open .q-chev{transform:rotate(180deg);}
.q-answer{padding:0 16px;max-height:0;overflow:hidden;transition:max-height .35s ease,padding .25s ease;}
.q-card.open .q-answer{max-height:200px;padding:0 16px 14px;}
.a-box{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:10px;padding:12px 14px;font-size:13px;color:rgba(255,255,255,.65);line-height:1.7;}
.check-icon{width:20px;height:20px;border-radius:50%;background:rgba(16,185,129,.2);border:1.5px solid rgba(16,185,129,.4);display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* Bottom bar */
.bbar{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(7,6,26,.94);backdrop-filter:blur(22px);border-top:1px solid rgba(16,185,129,.2);padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom,12px));}
.binner{max-width:720px;margin:0 auto;}
.btn-done{width:100%;background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-weight:800;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border-radius:13px;padding:13px;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .25s;box-shadow:0 6px 24px rgba(16,185,129,.4);position:relative;overflow:hidden;}
.btn-done:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(16,185,129,.6);}
.btn-done:active{transform:scale(.97);}
#ov{display:none;position:fixed;inset:0;z-index:900;background:rgba(4,3,14,.92);backdrop-filter:blur(20px);align-items:center;justify-content:center;padding:20px;}
#ov.show{display:flex;}
.ocard{background:linear-gradient(145deg,#1a1532,#0d0b1e);border:1.5px solid rgba(16,185,129,.4);border-radius:24px;padding:38px 28px;text-align:center;max-width:340px;width:100%;animation:popin .45s cubic-bezier(.34,1.4,.64,1);}
@keyframes popin{from{opacity:0;transform:scale(.75);}to{opacity:1;transform:scale(1);}}
@keyframes fadeup{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.18);transform:scale(0);animation:rp .55s linear;pointer-events:none;}
@keyframes rp{to{transform:scale(4);opacity:0;}}
#fw{position:fixed;inset:0;z-index:800;pointer-events:none;display:none;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:rgba(16,185,129,.3);border-radius:2px;}
</style>
</head>
<body>
<div class="bg"></div><div class="gbg"></div>
<div class="orb" style="width:340px;height:340px;background:rgba(16,185,129,.14);top:-80px;right:-60px;animation:fl 16s ease-in-out infinite;"></div>
<div class="orb" style="width:240px;height:240px;background:rgba(52,211,153,.09);bottom:15%;left:-40px;animation:fl 20s ease-in-out -8s infinite;"></div>
<canvas id="fw"></canvas>
<div id="ov">
  <div class="ocard">
    <div style="width:74px;height:74px;border-radius:50%;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 10px 36px rgba(16,185,129,.5);">
      <span class="ms material-symbols-outlined" style="font-size:36px;color:#fff;font-variation-settings:'FILL' 1">menu_book</span>
    </div>
    <h2 style="font-size:22px;font-weight:900;color:#fff;margin-bottom:6px;">Reading Complete!</h2>
    <p style="font-size:13px;color:rgba(255,255,255,.4);margin-bottom:16px;" id="ov-nm"></p>
    <div style="font-size:38px;font-weight:900;background:linear-gradient(135deg,#34d399,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;" id="ov-xp">+25 XP</div>
    <p style="font-size:12px;color:rgba(255,255,255,.28);margin-bottom:26px;">Excellent reading comprehension! 📖</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">
      <div style="background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:12px;padding:12px;"><div style="font-size:20px;font-weight:900;color:#34d399;" id="ov-qa">0/0</div><div style="font-size:11px;color:rgba(255,255,255,.3);">Q&amp;A answered</div></div>
      <div style="background:rgba(14,165,233,.1);border:1px solid rgba(14,165,233,.2);border-radius:12px;padding:12px;"><div style="font-size:20px;font-weight:900;color:#38bdf8;" id="ov-words">0</div><div style="font-size:11px;color:rgba(255,255,255,.3);" id="ov-words-label">Target words</div></div>
    </div>
    <button onclick="goBack()" style="width:100%;background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-weight:800;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border-radius:13px;padding:13px;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .2s;box-shadow:0 6px 22px rgba(16,185,129,.45);" onmouseover="this.style.transform='translateY(-1px)'" onmouseout="this.style.transform='translateY(0)'">
      <span class="ms material-symbols-outlined" style="font-size:18px;font-variation-settings:'FILL' 1">map</span> Back to Roadmap
    </button>
  </div>
</div>

<div class="page">
  <nav class="nav">
    <a class="back" href="roadmap.html" id="back-a"><span class="ms material-symbols-outlined" style="font-size:20px;">arrow_back</span></a>
    <div style="width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <span class="ms material-symbols-outlined" style="font-size:16px;color:#fff;font-variation-settings:'FILL' 1">menu_book</span>
    </div>
    <div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:800;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" id="nav-title">Reading</div></div>
    <div style="display:flex;gap:6px;flex-shrink:0;">
      <span style="background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:#34d399;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:700;" id="nav-qa">0/0 Q&amp;A</span>
      <span style="background:rgba(16,185,129,.2);border:1px solid rgba(16,185,129,.3);color:#34d399;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:800;" id="nav-xp">⚡25</span>
    </div>
  </nav>
  <div class="pbar"><div class="pfill" id="prog" style="width:0%"></div></div>
  <div class="cmax" id="content"></div>
</div>

<div class="bbar">
  <div class="binner">
    <button class="btn-done" onclick="doComplete()">
      <span class="ms material-symbols-outlined" style="font-size:19px;font-variation-settings:'FILL' 1">check_circle</span>
      <span id="btn-txt">Complete Reading</span>
    </button>
  </div>
</div>

<script>
const P=new URLSearchParams(location.search);
const LANG=P.get('lang')||'gujarati',AID=parseInt(P.get('id'))||3,AXP=parseInt(P.get('xp'))||25;
let act=null,cnt=null,openQs=new Set(),answered=new Set(),guWordCount=0;

async function init(){
  const all=LWData.getActivities(LANG);
  outer:for(const m of all)for(const a of m.activities){if(a.id===AID){act=a;break outer;}}
  // BUG #4 FIX: await content instead of 150ms race condition
  cnt = await LWInit.loadActivityContent(AID, LANG);
  const tgtName = LWInit.getTargetLangName();
  document.getElementById('nav-title').textContent=cnt?.title||act?.title||'Reading';
  document.getElementById('nav-xp').textContent='⚡'+(cnt?.xp||act?.xp||AXP);
  render(tgtName);
}

function render(tgtName){
  tgtName = tgtName || LWInit.getTargetLangName();
  const c=document.getElementById('content');
  const rb=cnt?.blocks?.find(b=>b.type==='reading');
  if(!rb){c.innerHTML=skeleton();return;}
  const xp=cnt?.xp||AXP;
  const passage=rb.passage||'';
  const questions=rb.questions||[];

  // BUG #9 FIX: highlight both Devanagari (Hindi) and Gujarati — and any other script
  const scriptRe = LWInit.getScriptRegex(window.LW_ACTIVE_TGT || 'hi');
  const lines=passage.split('\n');
  let passageHtml='',guCount=0;
  lines.forEach(line=>{
    if(!line.trim()){passageHtml+='<br>';return;}
    if(line.startsWith('📖')){passageHtml+=`<div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:rgba(52,211,153,.5);margin:0 0 14px;">${esc(line)}</div>`;return;}
    const highlighted=esc(line).replace(scriptRe,(m)=>{guCount+=m.trim().split(/\s+/).length;return`<span class="gu gu-word" onclick="highlightWord(this)">${m}</span>`;});
    passageHtml+=`<div style="margin-bottom:8px;">${highlighted}</div>`;
  });
  guWordCount=guCount;
  document.getElementById('nav-qa').textContent=`${answered.size}/${questions.length} Q&A`;

  c.innerHTML=`
  <div style="animation:fadeup .4s ease both;">
    <!-- Header -->
    <div style="background:linear-gradient(135deg,rgba(16,185,129,.2),rgba(16,185,129,.06));border:1px solid rgba(16,185,129,.28);border-radius:18px;padding:18px;margin-bottom:20px;">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:48px;height:48px;border-radius:13px;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 6px 20px rgba(16,185,129,.4);">
          <span class="ms material-symbols-outlined" style="font-size:24px;color:#fff;font-variation-settings:'FILL' 1">menu_book</span>
        </div>
        <div style="flex:1;">
          <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#34d399;margin-bottom:3px;">READING · Week ${cnt?.week||1}</div>
          <div style="font-size:16px;font-weight:900;color:#fff;">${esc(cnt?.title||'Reading')}</div>
        </div>
        <span style="background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.2);border-radius:999px;padding:4px 10px;font-size:11px;font-weight:800;">⚡${xp}</span>
      </div>
    </div>

    <!-- Reading progress -->
    <div class="read-prog">
      <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,.35);">Reading Progress</div>
      <div class="read-fill"><div class="read-inner" id="rpfill" style="width:0%"></div></div>
      <div style="font-size:11px;font-weight:700;color:rgba(52,211,153,.7);" id="rpct">0%</div>
    </div>

    <!-- Passage -->
    <div class="passage-card" id="passage" onscroll="updateReadProg()">
      <div class="passage-title">📖 Passage — tap ${tgtName} words to highlight</div>
      <div class="passage-text">${passageHtml}</div>
    </div>

    <!-- Guide tip -->
    <div style="background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.18);border-left:3px solid #10b981;border-radius:0 12px 12px 0;padding:12px 16px;margin-bottom:18px;display:flex;gap:10px;">
      <span style="font-size:18px;">💡</span>
      <div style="font-size:13px;color:rgba(52,211,153,.85);line-height:1.7;">Tap on any <span style="color:#34d399;font-weight:700;">highlighted ${tgtName} text</span> to mark it. Answer all questions below to deepen your understanding!</div>
    </div>

    <!-- Questions -->
    ${questions.length?`<div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.3);margin-bottom:12px;">📝 ${questions.length} Comprehension Questions</div>
    ${questions.map((q,i)=>`
    <div class="q-card${openQs.has(i)?' open':''}" id="qc${i}">
      <div class="q-header" onclick="toggleQ(${i})">
        <div class="q-num">${i+1}</div>
        <div class="q-text">${esc(q.q||'')}</div>
        <div style="display:flex;align-items:center;gap:6px;">
          ${answered.has(i)?`<div class="check-icon"><span class="ms material-symbols-outlined" style="font-size:11px;color:#10b981;font-variation-settings:'FILL' 1">check</span></div>`:''}
          <span class="ms material-symbols-outlined q-chev" style="font-size:18px;">keyboard_arrow_down</span>
        </div>
      </div>
      <div class="q-answer">
        <div class="a-box">${esc(q.a||'')}</div>
      </div>
    </div>`).join('')}`:''}
  `;
  trackScroll();
}

function highlightWord(el){el.style.background=el.style.background?'':'rgba(52,211,153,.15)';el.style.borderRadius='4px';}
function toggleQ(i){
  if(openQs.has(i))openQs.delete(i);else{openQs.add(i);answered.add(i);}
  const card=document.getElementById('qc'+i);if(card)card.classList.toggle('open',openQs.has(i));
  const qs=cnt?.blocks?.find(b=>b.type==='reading')?.questions||[];
  document.getElementById('nav-qa').textContent=`${answered.size}/${qs.length} Q&A`;
  document.getElementById('prog').style.width=Math.round((answered.size/Math.max(qs.length,1))*100)+'%';
}
function trackScroll(){
  const p=document.getElementById('passage');if(!p)return;
  const check=()=>{const pct=Math.min(100,Math.round(((p.scrollTop+p.clientHeight)/p.scrollHeight)*100));document.getElementById('rpfill').style.width=pct+'%';document.getElementById('rpct').textContent=pct+'%';};
  p.addEventListener('scroll',check);
  // Also update on window scroll for mobile
  window.addEventListener('scroll',()=>{document.getElementById('rpfill').style.width='100%';document.getElementById('rpct').textContent='100%';},{once:true,passive:true});
}
function doComplete(){
  const xp=cnt?.xp||AXP;const p=LWData.getProgress(LANG);const ids=p.completedIds||[];
  if(!ids.includes(AID))ids.push(AID);LWData.saveProgress(LANG,ids,(p.totalXP||0)+xp);
  const qs=cnt?.blocks?.find(b=>b.type==='reading')?.questions||[];
  document.getElementById('ov-nm').textContent=cnt?.title||act?.title||'Reading';
  document.getElementById('ov-xp').textContent='+'+xp+' XP';
  document.getElementById('ov-qa').textContent=answered.size+'/'+qs.length;
  document.getElementById('ov-words').textContent=guWordCount;
  // BUG #10 FIX: set dynamic label
  const lbl=document.getElementById('ov-words-label');if(lbl)lbl.textContent=LWInit.getTargetLangName()+' words';
  document.getElementById('ov').classList.add('show');launchFW();
}
function goBack(){const p=LWData.getProgress(LANG);const d=(p.completedIds||[]).includes(AID);window.location.href='roadmap.html?lang='+LANG+(d?'&completed='+AID+'&xp='+(cnt?.xp||AXP):'');}
function skeleton(){return`<div style="background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.15);border-radius:18px;padding:48px 20px;text-align:center;margin:16px 0;"><span class="ms material-symbols-outlined" style="font-size:52px;color:rgba(16,185,129,.3);font-variation-settings:'FILL' 1">auto_stories</span><h2 style="font-size:17px;font-weight:800;color:rgba(255,255,255,.45);margin:14px 0 8px;">Reading Passage Coming Soon</h2><p style="font-size:13px;color:rgba(255,255,255,.3);max-width:260px;margin:0 auto 22px;line-height:1.7;">Content is being prepared. Mark complete to earn XP!</p><button onclick="doComplete()" style="background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-weight:800;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border-radius:12px;padding:12px 22px;font-size:14px;display:inline-flex;align-items:center;gap:8px;"><span class="ms material-symbols-outlined" style="font-size:18px;font-variation-settings:'FILL' 1">check_circle</span>Mark Complete</button></div>`;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function launchFW(){const c=document.getElementById('fw');c.style.display='block';c.width=innerWidth;c.height=innerHeight;const ctx=c.getContext('2d');const cols=['#10b981','#34d399','#0ea5e9','#fbbf24'];const ps=Array.from({length:90},()=>({x:innerWidth/2+(Math.random()-.5)*280,y:innerHeight*.32,vx:(Math.random()-.5)*14,vy:(Math.random()-.5)*14-5,alpha:1,color:cols[~~(Math.random()*cols.length)],sz:Math.random()*5+2}));const t=()=>{ctx.clearRect(0,0,c.width,c.height);ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.22;p.alpha-=.014;ctx.globalAlpha=Math.max(0,p.alpha);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();});if(ps.some(p=>p.alpha>0))requestAnimationFrame(t);else c.style.display='none';};t();}
init();
</script>
</body>
</html>
